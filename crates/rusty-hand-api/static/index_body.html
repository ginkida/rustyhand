                  <div x-show="!activityLoading && activityEvents.length" style="max-height:320px;overflow-y:auto">
                    <template x-for="(ev, idx) in activityEvents" :key="idx">
                      <div style="display:grid;grid-template-columns:20px 1fr auto;gap:8px;padding:6px 4px;border-bottom:1px solid var(--border);font-size:12px;align-items:center">
                        <span class="text-dim" x-text="activityIcon(ev.type)"></span>
                        <div style="min-width:0">
                          <div class="font-bold" style="font-size:12px" x-text="ev.title"></div>
                          <div class="text-xs text-dim truncate" x-text="ev.detail" :title="ev.detail"></div>
                        </div>
                        <span class="text-xs text-dim" :title="ev.ts" x-text="activityTs(ev.ts)"></span>
                      </div>
                    </template>
                  </div>
                </div>
              </div>

              <!-- Tab: Files -->
              <div x-show="detailTab === 'files'">
                <div x-show="filesLoading" class="text-center text-dim" style="padding:24px">Loading files...</div>
                <div x-show="!filesLoading && !editingFile">
                  <template x-for="file in agentFiles" :key="file.name">
                    <div class="file-list-item" @click="openFile(file)">
                      <span class="font-mono" style="font-size:13px" x-text="file.name"></span>
                      <span class="text-xs text-dim" x-text="file.exists ? (file.size_bytes + ' bytes') : 'Not created'"></span>
                    </div>
                  </template>
                  <div x-show="!agentFiles.length && !filesLoading" class="text-center text-dim" style="padding:24px">No workspace files found</div>
                </div>
                <div x-show="editingFile">
                  <div class="flex justify-between items-center mb-2">
                    <span class="font-bold font-mono" x-text="editingFile"></span>
                    <button class="btn btn-ghost btn-sm" @click="closeFileEditor()">&larr; Back</button>
                  </div>
                  <textarea class="file-editor" x-model="fileContent" style="width:100%;height:280px;resize:vertical"></textarea>
                  <div class="flex gap-2 mt-2">
                    <button class="btn btn-primary btn-sm" @click="saveFile()" :disabled="fileSaving"><span x-show="!fileSaving">Save</span><span x-show="fileSaving">Saving...</span></button>
                    <button class="btn btn-ghost btn-sm" @click="closeFileEditor()">Cancel</button>
                  </div>
                </div>
              </div>

              <!-- Tab: Config (inline editable) -->
              <div x-show="detailTab === 'config'">
                <div class="form-group"><label>Name</label><input class="form-input" x-model="configForm.name"></div>
                <div class="form-group"><label>Group</label><input class="form-input" x-model="configForm.group" placeholder="Ops / Research / Clients"></div>
                <div class="form-group">
                  <label>System Prompt <span style="font-weight:400;opacity:0.55;font-size:11px" title="{{date}}, {{time}}, {{datetime}}, {{weekday}}, {{year}}, {{agent_name}}, {{agent_id}}">supports {{variables}}</span></label>
                  <textarea class="form-textarea" x-model="configForm.system_prompt" style="height:80px" placeholder="You are a helpful assistant. Today is {{date}}."></textarea>
                </div>
                <div class="form-group">
                  <label>Temperature <span style="font-weight:400;opacity:0.6;font-size:11px">(0.0 – 2.0)</span></label>
                  <input class="form-input" type="number" step="0.05" min="0" max="2" x-model.number="configForm.temperature" style="width:120px">
                </div>
                <div class="form-group">
                  <label>Max Tokens</label>
                  <input class="form-input" type="number" step="256" min="256" x-model.number="configForm.max_tokens" style="width:140px">
                </div>
                <div class="form-group" style="display:flex;align-items:center;gap:10px">
                  <label style="margin:0">Extended Thinking</label>
                  <button class="btn btn-sm" :class="configForm.thinking_enabled ? 'btn-primary' : 'btn-ghost'" @click="configForm.thinking_enabled = !configForm.thinking_enabled" x-text="configForm.thinking_enabled ? 'Enabled' : 'Disabled'"></button>
                </div>
                <div class="form-group"><label>Emoji</label>
                  <div class="emoji-grid">
                    <template x-for="em in emojiOptions" :key="em">
                      <button class="emoji-grid-item" :class="{ active: configForm.emoji === em }" @click="configForm.emoji = em" x-text="em"></button>
                    </template>
                  </div>
                </div>
                <div class="form-group"><label>Color</label><input type="color" x-model="configForm.color" style="width:48px;height:32px;border:none;cursor:pointer;background:none"></div>
                <div class="form-group"><label>Archetype</label>
                  <select class="form-select" x-model="configForm.archetype">
                    <option value="">None</option>
                    <template x-for="a in archetypeOptions" :key="a"><option :value="a.toLowerCase()" x-text="a"></option></template>
                  </select>
                </div>
                <div class="form-group"><label>Vibe</label>
                  <select class="form-select" x-model="configForm.vibe">
                    <option value="">None</option>
                    <option value="professional">Professional</option><option value="friendly">Friendly</option>
                    <option value="technical">Technical</option><option value="creative">Creative</option>
                    <option value="concise">Concise</option><option value="mentor">Mentor</option>
                  </select>
                </div>
                <button class="btn btn-primary mt-4" @click="saveConfig()" :disabled="configSaving">
                  <span x-show="!configSaving">Save Config</span><span x-show="configSaving">Saving...</span>
                </button>
              </div>

              <!-- Tab: Memories -->
              <div x-show="detailTab === 'memories'">
                <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
                  <input class="form-input" style="flex:1" x-model="memoriesQuery" placeholder="Search memories..." @keydown.enter="loadMemories(detailAgent && detailAgent.id)">
                  <button class="btn btn-ghost btn-sm" @click="loadMemories(detailAgent && detailAgent.id)" :disabled="memoriesLoading">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                  </button>
                </div>
                <div x-show="memoriesLoading" class="text-dim text-xs" style="padding:16px 0">Loading memories...</div>
                <div x-show="memoriesError" class="text-xs" style="color:var(--error);padding:8px 0" x-text="memoriesError"></div>
                <div x-show="!memoriesLoading && !memoriesError && agentMemories.length === 0" class="text-dim text-xs" style="padding:16px 0;text-align:center">No memories stored yet. The agent records memories as it converses.</div>
                <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px" x-show="memoriesTotal > 0" x-text="memoriesTotal + ' memories found'"></div>
                <div style="display:flex;flex-direction:column;gap:6px;max-height:360px;overflow-y:auto">
                  <template x-for="mem in agentMemories" :key="mem.id">
                    <div style="background:var(--surface-2,var(--surface));border:1px solid var(--border);border-radius:6px;padding:8px 10px">
                      <div class="text-xs" style="line-height:1.5" x-text="mem.content"></div>
                      <div style="display:flex;gap:8px;align-items:center;margin-top:4px;flex-wrap:wrap">
                        <span class="badge badge-muted text-xs" x-text="mem.scope || 'episodic'"></span>
                        <span class="text-xs text-dim" x-text="new Date(mem.created_at).toLocaleDateString()"></span>
                        <span class="text-xs text-dim" x-show="mem.access_count > 0" x-text="mem.access_count + 'x accessed'"></span>
                        <span class="text-xs" :style="'color:hsl(' + Math.round(mem.confidence * 120) + ',60%,45%)'">conf: <span x-text="mem.confidence.toFixed(2)"></span></span>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </div>
        </template>

        <!-- Multi-step Spawn Wizard -->
        <template x-if="showSpawnModal">
          <div class="modal-overlay" @click.self="showSpawnModal = false" @keydown.escape.window="showSpawnModal = false">
            <div class="agent-wizard" style="max-width:560px">
              <!-- Header -->
              <div class="agent-wizard-header">
                <span class="wizard-icon">&#x1F916;</span>
                <div>
                  <div class="wizard-title">Create Agent</div>
                  <div class="wizard-subtitle">Set up a new AI agent in 3 steps</div>
                </div>
                <button class="wizard-close" @click="showSpawnModal = false">&times;</button>
              </div>

              <!-- Wizard / TOML toggle -->
              <div style="padding:12px 24px 0;display:flex;gap:8px">
                <div class="tab" :class="{ active: spawnMode === 'wizard' }" @click="spawnMode = 'wizard'">Wizard</div>
                <div class="tab" :class="{ active: spawnMode === 'toml' }" @click="spawnMode = 'toml'">Raw TOML</div>
              </div>

              <!-- Raw TOML mode -->
              <div class="agent-wizard-body" x-show="spawnMode === 'toml'">
                <div class="form-group">
                  <label>Agent Manifest (TOML)</label>
                  <textarea class="form-textarea" style="height:200px;font-size:11px" x-model="spawnToml" placeholder='name = "my-agent"&#10;group = "Operations"&#10;module = "builtin:chat"&#10;profile = "full"&#10;&#10;[model]&#10;provider = "minimax"&#10;model = "MiniMax-M2.7"&#10;system_prompt = "You are helpful."'></textarea>
                </div>
                <button class="btn btn-primary btn-block mt-4" @click="spawnAgent()" :disabled="spawning">
                  <span x-show="!spawning">Spawn Agent</span><span x-show="spawning">Spawning...</span>
                </button>
              </div>

              <!-- Wizard mode -->
              <template x-if="spawnMode === 'wizard'">
                <div>
                  <!-- Step indicators -->
                  <div class="agent-steps">
                    <div class="agent-step-item" :class="{ active: spawnStep === 1, done: spawnStep > 1 }">
                      <div class="agent-step-num" x-text="spawnStep > 1 ? '\u2713' : '1'"></div>
                      <div class="agent-step-label">Identity</div>
                    </div>
                    <div class="agent-step-line" :class="{ done: spawnStep > 1 }"></div>
                    <div class="agent-step-item" :class="{ active: spawnStep === 2, done: spawnStep > 2 }">
                      <div class="agent-step-num" x-text="spawnStep > 2 ? '\u2713' : '2'"></div>
                      <div class="agent-step-label">Model</div>
                    </div>
                    <div class="agent-step-line" :class="{ done: spawnStep > 2 }"></div>
                    <div class="agent-step-item" :class="{ active: spawnStep === 3 }">
                      <div class="agent-step-num">3</div>
                      <div class="agent-step-label">Launch</div>
                    </div>
                  </div>

                  <!-- Step 1: Identity -->
                  <div class="agent-wizard-body" x-show="spawnStep === 1">
                    <div class="form-group">
                      <label>Agent Name</label>
                      <input class="form-input" x-model="spawnForm.name" placeholder="my-agent" @keydown.enter="nextStep()">
                    </div>
                    <div class="form-group">
                      <label>Group <span class="text-xs text-dim">(optional)</span></label>
                      <input class="form-input" x-model="spawnForm.group" placeholder="Ops / Research / Clients">
                    </div>
                    <div class="form-group">
                      <label>Emoji</label>
                      <div class="emoji-grid">
                        <template x-for="em in emojiOptions" :key="em">
                          <button class="emoji-grid-item" :class="{ active: spawnIdentity.emoji === em }" @click="spawnIdentity.emoji = em" x-text="em"></button>
                        </template>
                      </div>
                    </div>
                    <div class="form-group">
                      <label>Color</label>
                      <input type="color" x-model="spawnIdentity.color" style="width:48px;height:32px;border:none;cursor:pointer;background:none">
                    </div>
                    <div class="form-group">
                      <label>Archetype</label>
                      <select class="form-select" x-model="spawnIdentity.archetype">
                        <option value="">Choose...</option>
                        <template x-for="a in archetypeOptions" :key="a"><option :value="a.toLowerCase()" x-text="a"></option></template>
                      </select>
                    </div>
                  </div>

                  <!-- Step 2: Model & Persona -->
                  <div class="agent-wizard-body" x-show="spawnStep === 2">
                    <div class="form-group">
                      <label>Provider</label>
                      <div style="display:flex;flex-wrap:wrap;gap:6px">
                        <template x-for="p in wizardProviders" :key="p.id">
                          <button class="provider-pill" :class="{ active: spawnForm.provider === p.id }" @click="selectProvider(p.id)">
                            <span x-text="p.display_name || p.id"></span>
                            <span class="pill-count" x-text="p.model_count || ''"></span>
                            <span x-show="p.id === $store.app.defaultProvider" class="pill-default">default</span>
                          </button>
                        </template>
                        <span x-show="wizardProviders.length === 0 && wizardDataLoaded" class="text-xs text-dim" style="padding:6px 0">
                          No providers configured. Go to <a href="#" @click.prevent="$store.app.page='settings'" style="color:var(--accent)">Settings</a> to add API keys.
                        </span>
                        <span x-show="wizardProviders.length === 0 && !wizardDataLoaded" class="text-xs text-dim" style="padding:6px 0">Loading providers...</span>
                      </div>
                    </div>
                    <div class="form-group" x-show="spawnForm.provider">
                      <label>Model</label>
                      <select class="form-select" x-model="spawnForm.model" style="font-size:13px">
                        <template x-for="m in wizardModels" :key="m.id">
                          <option :value="m.id" x-text="(m.display_name || m.id) + '  \u2022  ' + tierLabel(m.tier) + '  \u2022  ' + formatCtx(m.context_window) + ' ctx'"></option>
                        </template>
                      </select>
                      <!-- Model info card -->
                      <div x-show="selectedModelInfo" class="model-info-card" style="margin-top:8px;padding:10px 14px;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--bg);display:flex;gap:16px;align-items:center;flex-wrap:wrap">
                        <div style="display:flex;align-items:center;gap:6px">
                          <span class="model-tier-badge" :style="'background:' + tierColor(selectedModelInfo.tier) + '22; color:' + tierColor(selectedModelInfo.tier) + '; border:1px solid ' + tierColor(selectedModelInfo.tier) + '44'" x-text="tierLabel(selectedModelInfo.tier)"></span>
                          <span style="font-weight:600;font-size:13px" x-text="selectedModelInfo.display_name || selectedModelInfo.id"></span>
                        </div>
                        <div style="display:flex;gap:12px;font-size:11px;color:var(--text-dim)">
                          <span x-text="formatCtx(selectedModelInfo.context_window) + ' context'"></span>
                          <span x-text="formatCtx(selectedModelInfo.max_output_tokens) + ' output'"></span>
                          <span x-text="formatCost(selectedModelInfo.input_cost_per_m) + ' / ' + formatCost(selectedModelInfo.output_cost_per_m) + ' per 1M'"></span>
                        </div>
                        <div style="display:flex;gap:6px;font-size:10px">
                          <span x-show="selectedModelInfo.supports_tools" class="model-cap-badge">Tools</span>
                          <span x-show="selectedModelInfo.supports_vision" class="model-cap-badge">Vision</span>
                          <span x-show="selectedModelInfo.supports_streaming" class="model-cap-badge">Streaming</span>
                        </div>
                      </div>
                      <div x-show="wizardModels.length === 0 && spawnForm.provider" class="text-xs text-dim" style="margin-top:4px">
                        No models found for this provider.
                        <input class="form-input mt-2" x-model="spawnForm.model" placeholder="Enter model ID manually">
                      </div>
                    </div>
                    <div class="form-group">
                      <label>System Prompt <span style="font-weight:400;opacity:0.55;font-size:11px" title="{{date}}, {{time}}, {{datetime}}, {{weekday}}, {{year}}, {{agent_name}}, {{agent_id}}">supports {{variables}}</span></label>
                      <textarea class="form-textarea" x-model="spawnForm.systemPrompt" placeholder="You are a helpful assistant. Today is {{date}}."></textarea>
                    </div>
                    <div class="form-group">
                      <label class="mb-2" style="display:block;font-size:13px;font-weight:600">Personality</label>
                      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">
                        <template x-for="preset in personalityPresets" :key="preset.id">
                          <button class="personality-pill" :class="{ active: selectedPreset === preset.id }" @click="selectPreset(preset)" x-text="preset.label"></button>
                        </template>
                      </div>
                      <div class="form-group" style="margin-top:8px">
                        <label>Soul / Persona <span class="text-xs text-dim">(editable)</span></label>
                        <textarea class="form-textarea" x-model="soulContent" style="height:80px" placeholder="Describe this agent's personality and communication style..."></textarea>
                      </div>
                    </div>
                  </div>

                  <!-- Step 3: Tools & Launch -->
                  <div class="agent-wizard-body" x-show="spawnStep === 3">
                    <div class="form-group">
                      <label>Tool Profile</label>
                      <select class="form-select" x-model="spawnForm.profile" @focus="loadSpawnProfiles()">
                        <option value="minimal">Minimal &mdash; Read-only file access</option>
                        <option value="coding">Coding &mdash; Files + shell + web fetch</option>
                        <option value="research">Research &mdash; Web search + file read/write</option>
                        <option value="messaging">Messaging &mdash; Agents + memory access</option>
                        <option value="automation">Automation &mdash; All tools except custom</option>
                        <option value="full" selected>Full &mdash; All 48 tools</option>
                        <option value="custom">Custom (manual capabilities)</option>
                      </select>
                      <div class="capability-preview" x-show="selectedProfileTools.length > 0" style="margin-top:8px">
                        <div class="capability-preview-title">Tools included</div>
                        <div style="display:flex;flex-wrap:wrap;gap:2px">
                          <template x-for="tool in selectedProfileTools" :key="tool"><span class="tool-badge" x-text="tool"></span></template>
                          <span class="tool-badge" x-show="selectedProfileTools.length >= 15" style="opacity:0.6">...</span>
                        </div>
                      </div>
                      <div x-show="spawnProfilesError" class="card" style="margin-top:8px;border-left:3px solid var(--warning)">
                        <div class="text-xs text-dim" x-text="spawnProfilesError"></div>
                      </div>
                    </div>
                    <div class="form-group" x-show="spawnForm.profile === 'custom'">
                      <label>Capabilities</label>
                      <div class="flex gap-3" style="flex-wrap:wrap">
                        <label class="form-checkbox"><input type="checkbox" x-model="spawnForm.caps.memory_read"> Memory Read</label>
                        <label class="form-checkbox"><input type="checkbox" x-model="spawnForm.caps.memory_write"> Memory Write</label>
                        <label class="form-checkbox"><input type="checkbox" x-model="spawnForm.caps.network"> Network</label>
                        <label class="form-checkbox"><input type="checkbox" x-model="spawnForm.caps.shell"> Shell</label>
                        <label class="form-checkbox"><input type="checkbox" x-model="spawnForm.caps.agent_spawn"> Agent Spawn</label>
                      </div>
                    </div>
                    <!-- Optional Schedule -->
                    <div class="form-group">
                      <label style="display:flex;align-items:center;gap:8px">
                        <input type="checkbox" x-model="spawnForm.autonomous">
                        Run on a schedule (autonomous)
                      </label>
                    </div>
                    <div x-show="spawnForm.autonomous" style="margin-top:8px">
                      <div class="form-group">
                        <label>Schedule</label>
                        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">
                          <template x-for="p in cronPresets" :key="p.expr">
                            <button class="provider-pill" :class="{active: spawnForm.cronExpr === p.expr}"
                                    @click="spawnForm.cronExpr = p.expr" x-text="p.label"></button>
                          </template>
                        </div>
                        <input class="form-input" x-model="spawnForm.cronExpr" placeholder="0 9 * * *"
                               style="font-family:monospace;font-size:12px">
                      </div>
                      <div class="form-group">
                        <label>Trigger Message</label>
                        <input class="form-input" x-model="spawnForm.cronMessage"
                               placeholder="Run your scheduled task now">
                      </div>
                    </div>
                    <!-- Review card -->
                    <div class="card" style="margin-top:8px">
                      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
                        <div style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px" :style="'background:' + spawnIdentity.color + '22; border:2px solid ' + spawnIdentity.color">
                          <span x-text="spawnIdentity.emoji || '\u{1F916}'"></span>
                        </div>
                        <div>
                          <div class="font-bold" style="font-size:15px" x-text="spawnForm.name || 'Unnamed'"></div>
                          <div class="text-xs text-dim" x-text="spawnIdentity.archetype || 'agent'"></div>
                        </div>
                      </div>
                      <div class="detail-grid" style="gap:6px">
                        <div class="detail-row"><span class="detail-label">Group</span><span class="detail-value" x-text="spawnForm.group || 'Ungrouped'"></span></div>
                        <div class="detail-row"><span class="detail-label">Provider</span><span class="detail-value" x-text="(wizardProviders.find(function(p){return p.id===spawnForm.provider}) || {}).display_name || spawnForm.provider"></span></div>
                        <div class="detail-row"><span class="detail-label">Model</span><span class="detail-value" x-text="selectedModelInfo ? selectedModelInfo.display_name : spawnForm.model"></span></div>
                        <div class="detail-row"><span class="detail-label">Profile</span><span class="detail-value" x-text="spawnForm.profile"></span></div>
                        <div class="detail-row" x-show="selectedPreset"><span class="detail-label">Personality</span><span class="detail-value" style="text-transform:capitalize" x-text="selectedPreset"></span></div>
                        <div class="detail-row" x-show="spawnForm.autonomous"><span class="detail-label">Schedule</span><span class="detail-value" style="font-family:monospace;font-size:11px" x-text="spawnForm.cronExpr || 'none'"></span></div>
                      </div>
                    </div>
                  </div>

                  <!-- Navigation -->
                  <div class="agent-wizard-nav">
                    <button class="btn btn-ghost" x-show="spawnStep > 1" @click="prevStep()">Back</button>
                    <div x-show="spawnStep <= 1"></div>
                    <button class="btn btn-primary" x-show="spawnStep < 3" @click="nextStep()">Next</button>
                    <button class="btn btn-primary btn-launch" x-show="spawnStep === 3" @click="spawnAgent()" :disabled="spawning">
                      <span x-show="!spawning">Spawn Agent</span><span x-show="spawning">Spawning...</span>
                    </button>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>

      </div>
    </template>

    <!-- Page: Approvals -->
    <template x-if="page === 'approvals'">
      <div x-data="approvalsPage" x-init="init(); loadData()">
        <div class="page-header">
          <div class="flex items-center gap-3">
            <h2 style="margin:0;font-size:18px">Approvals</h2>
            <span class="badge badge-warn" x-show="pendingCount > 0" x-text="pendingCount + ' pending'"></span>
            <span class="badge badge-success" x-show="approvedCount > 0" x-text="approvedCount + ' approved'"></span>
            <span class="badge badge-muted" x-show="rejectedCount > 0" x-text="rejectedCount + ' rejected'"></span>
          </div>
          <div class="flex items-center gap-2">
            <div class="filter-pills">
              <button class="filter-pill" :class="{ active: filterStatus === 'all' }" @click="filterStatus = 'all'" x-text="'All (' + approvals.length + ')'"></button>
              <button class="filter-pill" :class="{ active: filterStatus === 'pending' }" @click="filterStatus = 'pending'">Pending</button>
              <button class="filter-pill" :class="{ active: filterStatus === 'approved' }" @click="filterStatus = 'approved'">Approved</button>
              <button class="filter-pill" :class="{ active: filterStatus === 'rejected' }" @click="filterStatus = 'rejected'">Rejected</button>
            </div>
            <button class="btn btn-ghost btn-sm" @click="loadData()">Refresh</button>
          </div>
        </div>
        <div class="page-body">
          <div x-show="loading && !approvals.length" class="text-center text-dim" style="padding:48px 0">Loading approvals...</div>
          <div x-show="!loading && loadError" class="error-state">
            <span class="error-icon">!</span>
            <p x-text="loadError"></p>
            <button class="btn btn-ghost btn-sm" @click="loadData()">Retry</button>
          </div>
          <template x-if="!loadError">
            <div>
              <!-- Empty state -->
              <div x-show="!loading && filtered.length === 0" class="empty-state" style="padding:60px 0">
                <div style="font-size:48px;margin-bottom:12px;opacity:0.3">&#9989;</div>
                <h4 style="margin:0 0 6px">All clear</h4>
                <p class="hint" style="max-width:360px">When agents request permission for sensitive tool executions, pending approvals will appear here for your review.</p>
              </div>
              <!-- Approval list -->
              <div style="display:flex;flex-direction:column;gap:8px">
                <template x-for="a in filtered" :key="a.id">
                  <div class="card approval-card" :class="{ approved: a.status === 'approved', rejected: a.status === 'rejected', expired: a.status === 'expired' }">
                    <div style="display:flex;align-items:flex-start;gap:12px">
                      <!-- Risk icon -->
                      <div style="flex-shrink:0;font-size:20px;line-height:1;padding-top:2px" x-text="riskIcon(a.risk_level)"></div>
                      <!-- Content -->
                      <div style="flex:1;min-width:0">
                        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px">
                          <div style="display:flex;align-items:center;gap:8px;min-width:0">
                            <span class="font-bold" style="font-size:14px" x-text="a.tool_name || a.action || 'Action'"></span>
                            <span class="badge" :class="{ 'badge-warn': a.status === 'pending', 'badge-success': a.status === 'approved', 'badge-error': a.status === 'rejected', 'badge-muted': a.status === 'expired' }" x-text="a.status"></span>
                            <span x-show="a.risk_level" class="text-xs" :style="'color:' + riskColor(a.risk_level)" x-text="riskLabel(a.risk_level) + ' risk'"></span>
                          </div>
                        </div>
                        <div class="text-sm text-dim" style="margin-bottom:6px" x-show="a.description" x-text="a.description"></div>
                        <div x-show="a.action_summary" class="font-mono text-xs" style="background:var(--bg);padding:6px 10px;border-radius:var(--radius-sm);margin-bottom:8px;word-break:break-all;border:1px solid var(--border)" x-text="a.action_summary"></div>
                        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
                          <span class="text-xs text-dim" x-text="'Agent: ' + (a.agent_name || a.agent_id || '?')"></span>
                          <span class="text-xs text-dim" x-text="timeAgo(a.requested_at || a.created_at)"></span>
                          <!-- Countdown timer for pending -->
                          <span x-show="a.status === 'pending' && a.timeout_secs" class="text-xs" :style="timeRemainingPct(a) < 20 ? 'color:var(--error);font-weight:700' : 'color:var(--warning)'" x-text="timeRemaining(a) + ' left'"></span>
                        </div>
                        <!-- Timeout progress bar -->
                        <div x-show="a.status === 'pending' && a.timeout_secs" style="margin-top:8px;height:3px;border-radius:2px;background:var(--border);overflow:hidden">
                          <div style="height:100%;border-radius:2px;transition:width 1s linear" :style="'width:' + timeRemainingPct(a) + '%; background:' + (timeRemainingPct(a) < 20 ? 'var(--error)' : 'var(--warning)')"></div>
                        </div>
                        <!-- Action buttons for pending -->
                        <div x-show="a.status === 'pending'" style="display:flex;gap:8px;margin-top:10px">
                          <button class="btn btn-success btn-sm" @click="approve(a.id)">Approve</button>
                          <button class="btn btn-danger btn-sm" @click="reject(a.id)">Reject</button>
                        </div>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Page: Workflows -->
    <template x-if="page === 'workflows'">
      <div x-data="{ wfTab: 'list' }">
        <div class="page-header" style="margin-bottom:0">
          <div class="flex items-center gap-3">
            <h2 style="margin:0;font-size:18px">Workflows</h2>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-ghost btn-sm" :class="{ active: wfTab === 'list' }" @click="wfTab = 'list'">List</button>
            <button class="btn btn-ghost btn-sm" :class="{ active: wfTab === 'builder' }" @click="wfTab = 'builder'">Visual Builder</button>
          </div>
        </div>

        <!-- Tab: List -->
        <template x-if="wfTab === 'list'">
        <div x-data="workflowsPage">
        <div class="page-body" x-init="loadWorkflows()">
          <div x-show="loading"><div class="skeleton-table-rows"><div class="skeleton-table-header"><div class="skeleton-line-sm" style="width:20%;margin:0"></div><div class="skeleton-line-sm" style="width:30%;margin:0"></div><div class="skeleton-line-sm" style="width:15%;margin:0"></div></div><div class="skeleton-table-row"><div class="skeleton-line" style="width:25%;margin:0"></div><div class="skeleton-line" style="width:35%;margin:0"></div><div class="skeleton-badge"></div></div><div class="skeleton-table-row"><div class="skeleton-line" style="width:20%;margin:0"></div><div class="skeleton-line" style="width:30%;margin:0"></div><div class="skeleton-badge"></div></div><div class="skeleton-table-row"><div class="skeleton-line" style="width:22%;margin:0"></div><div class="skeleton-line" style="width:28%;margin:0"></div><div class="skeleton-badge"></div></div><div class="skeleton-table-row"><div class="skeleton-line" style="width:18%;margin:0"></div><div class="skeleton-line" style="width:32%;margin:0"></div><div class="skeleton-badge"></div></div><div class="skeleton-table-row"><div class="skeleton-line" style="width:24%;margin:0"></div><div class="skeleton-line" style="width:26%;margin:0"></div><div class="skeleton-badge"></div></div></div></div>
          <div x-show="!loading && loadError" class="error-state">
            <span class="error-icon">!</span>
            <p x-text="loadError"></p>
            <button class="btn btn-ghost btn-sm" @click="loadData()">Retry</button>
          </div>
          <div x-show="!loading && !loadError">
          <div class="flex gap-2 mb-4" style="margin-top:16px">
            <button class="btn btn-primary btn-sm" @click="openCreateModal()">+ New Workflow</button>
            <button class="btn btn-ghost btn-sm" @click="loadData()">Refresh</button>
          </div>
          <div class="table-wrap" x-show="workflows.length">
            <table>
              <thead><tr><th>Name</th><th>Steps</th><th>Created</th><th>Actions</th></tr></thead>
              <tbody>
                <template x-for="wf in workflows" :key="wf.id">
                  <tr>
                    <td><span class="font-bold" x-text="wf.name"></span><br><span class="text-xs text-dim" x-text="wf.description"></span></td>
                    <td x-text="Array.isArray(wf.steps) ? wf.steps.length + ' step' + (wf.steps.length !== 1 ? 's' : '') : wf.steps"></td>
                    <td class="text-xs" x-text="new Date(wf.created_at).toLocaleDateString()"></td>
                    <td>
                      <button class="btn btn-primary btn-sm" @click="showRunModal(wf)">Run</button>
                      <button class="btn btn-ghost btn-sm" @click="viewRuns(wf)">History</button>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
          <div class="empty-state" x-show="!workflows.length">
            <div class="empty-state-icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v12M18 9a9 9 0 0 1-9 9"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/></svg>
            </div>
            <h3>No workflows yet</h3>
            <p>Chain multiple agents into automated pipelines with branching, fan-out, and loops.</p>
            <button class="btn btn-primary" @click="openCreateModal()">Create Workflow</button>
          </div>
          </div>
        </div>
        <!-- Modals (inside workflowsPage scope, outside page-body) -->
        <!-- Create Workflow Modal -->
        <template x-if="showCreateModal">
          <div class="modal-overlay" @click.self="showCreateModal = false" @keydown.escape.window="showCreateModal = false">
            <div class="modal" style="max-width:640px;max-height:85vh;overflow-y:auto">
              <div class="modal-header"><h3>Create Workflow</h3><button class="modal-close" @click="showCreateModal = false">&times;</button></div>
              <div style="display:flex;gap:12px;margin-bottom:16px">
                <div class="form-group" style="flex:1;margin:0"><label>Name</label><input class="form-input" x-model="newWf.name" placeholder="data-pipeline"></div>
                <div class="form-group" style="flex:2;margin:0"><label>Description</label><input class="form-input" x-model="newWf.description" placeholder="What does this workflow do?"></div>
              </div>
              <!-- Steps -->
              <div style="margin-bottom:12px">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                  <label style="font-size:13px;font-weight:600">Steps</label>
                  <span class="text-xs text-dim" x-text="newWf.steps.length + ' step' + (newWf.steps.length !== 1 ? 's' : '')"></span>
                </div>
                <div class="text-xs text-dim" style="margin-bottom:10px">Each step runs an agent. Use <code style="color:var(--accent)">{{input}}</code> for previous output, <code style="color:var(--accent)">{{var_name}}</code> for stored variables.</div>
                <template x-for="(step, i) in newWf.steps" :key="i">
                  <div class="card" style="padding:0;margin-bottom:8px;overflow:hidden">
                    <!-- Step header -->
                    <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;background:var(--bg)" @click="step._expanded = !step._expanded">
                      <span class="font-bold" style="font-size:12px;color:var(--text-dim);width:20px" x-text="'#' + (i+1)"></span>
                      <span style="width:8px;height:8px;border-radius:50%;flex-shrink:0" :style="'background:' + modeColor(step.mode)"></span>
                      <span class="font-bold" style="font-size:13px;flex:1;min-width:0" x-text="step.name || 'Unnamed step'"></span>
                      <span class="text-xs text-dim" x-text="modeLabel(step.mode)"></span>
                      <span class="text-xs text-dim" x-text="step.agent_name || 'no agent'"></span>
                      <span style="font-size:10px;color:var(--text-dim);transition:transform 0.15s" :style="step._expanded ? 'transform:rotate(90deg)' : ''">&#9654;</span>
                    </div>
                    <!-- Step body -->
                    <div x-show="step._expanded" x-transition style="padding:10px 12px;border-top:1px solid var(--border)">
                      <div style="display:flex;gap:8px;margin-bottom:8px">
                        <div style="flex:1"><label class="text-xs text-dim">Step Name</label><input class="form-input" x-model="step.name" placeholder="summarize" style="font-size:12px"></div>
                        <div style="flex:1"><label class="text-xs text-dim">Agent</label>
                          <select class="form-select" x-model="step.agent_name" style="font-size:12px">
                            <option value="">Select agent...</option>
                            <template x-for="a in agents" :key="a.id">
                              <option :value="a.name" x-text="a.name"></option>
                            </template>
                          </select>
                        </div>
                        <div style="width:130px"><label class="text-xs text-dim">Mode</label>
                          <select class="form-select" x-model="step.mode" style="font-size:12px">
                            <option value="sequential">Sequential</option>
                            <option value="fan_out">Fan Out</option>
                            <option value="collect">Collect</option>
                            <option value="conditional">Conditional</option>
                            <option value="loop">Loop</option>
                          </select>
                        </div>
                      </div>
                      <div style="margin-bottom:8px"><label class="text-xs text-dim">Prompt Template</label>
                        <textarea class="form-textarea" x-model="step.prompt" placeholder="Summarize this: {{input}}" style="font-size:12px;height:50px"></textarea>
                      </div>
                      <div x-show="step.mode === 'conditional'" style="margin-bottom:8px">
                        <label class="text-xs text-dim">Condition (substring match in previous output)</label>
                        <input class="form-input" x-model="step.condition" placeholder="e.g. 'yes' or 'approved'" style="font-size:12px">
                      </div>
                      <div x-show="step.mode === 'loop'" style="display:flex;gap:8px;margin-bottom:8px">
                        <div style="flex:1"><label class="text-xs text-dim">Max Iterations</label>
                          <input class="form-input" type="number" x-model="step.max_iterations" min="1" max="50" style="font-size:12px">
                        </div>
                        <div style="flex:2"><label class="text-xs text-dim">Until (stop when output contains)</label>
                          <input class="form-input" x-model="step.until" placeholder="e.g. 'DONE'" style="font-size:12px">
                        </div>
                      </div>
                      <div style="display:flex;gap:8px;align-items:end">
                        <div style="width:110px"><label class="text-xs text-dim">Error Mode</label>
                          <select class="form-select" x-model="step.error_mode" style="font-size:12px">
                            <option value="fail">Fail</option>
                            <option value="skip">Skip</option>
                            <option value="retry">Retry</option>
                          </select>
                        </div>
                        <div style="width:90px"><label class="text-xs text-dim">Timeout (s)</label>
                          <input class="form-input" type="number" x-model="step.timeout_secs" min="10" max="3600" style="font-size:12px">
                        </div>
                        <div style="flex:1"><label class="text-xs text-dim">Output Variable</label>
                          <input class="form-input" x-model="step.output_var" placeholder="result_1" style="font-size:12px">
                        </div>
                        <div style="display:flex;gap:4px">
                          <button class="btn btn-ghost btn-sm" style="padding:4px 6px" @click="moveStep(i, -1)" :disabled="i === 0" title="Move up">&#9650;</button>
                          <button class="btn btn-ghost btn-sm" style="padding:4px 6px" @click="moveStep(i, 1)" :disabled="i === newWf.steps.length - 1" title="Move down">&#9660;</button>
                          <button class="btn btn-ghost btn-sm" style="padding:4px 6px;color:var(--error)" @click="removeStep(i)" title="Delete step">&times;</button>
                        </div>
                      </div>
                    </div>
                  </div>
                </template>
                <button class="btn btn-ghost btn-sm" @click="addStep()">+ Add Step</button>
              </div>
              <button class="btn btn-primary btn-block" @click="createWorkflow()">Create Workflow</button>
            </div>
          </div>
        </template>
        <!-- Run modal -->
        <template x-if="runModal">
          <div class="modal-overlay" @click.self="runModal = null" @keydown.escape.window="runModal = null">
            <div class="modal">
              <div class="modal-header"><h3 x-text="'Run: ' + runModal.name"></h3><button class="modal-close" @click="runModal = null">&times;</button></div>
              <div class="form-group"><label>Input</label><textarea class="form-textarea" x-model="runInput" placeholder="Enter workflow input..."></textarea></div>
              <button class="btn btn-primary btn-block" @click="executeWorkflow()" :disabled="running">
                <span x-show="!running">Execute</span><span x-show="running">Running...</span>
              </button>
              <div class="card mt-4" x-show="runResult">
                <div class="card-header">Result</div>
                <pre style="font-size:11px;white-space:pre-wrap;margin-top:8px;color:var(--text-dim)" x-text="runResult"></pre>
              </div>
            </div>
          </div>
        </template>
        </div>
        </template>

        <!-- Tab: Visual Builder -->
        <template x-if="wfTab === 'builder'">
        <div x-data="workflowBuilder()" x-init="init()">
          <div class="wf-builder-layout">
            <!-- Node palette (left sidebar) -->
            <div class="wf-palette">
              <div class="wf-palette-title">Node Palette</div>
              <div class="text-xs text-dim mb-3">Drag nodes onto the canvas</div>
              <div x-show="agentsLoadError" class="card" style="border-left:3px solid var(--warning);margin-bottom:12px;padding:10px">
                <div class="font-bold" style="font-size:12px;margin-bottom:4px;color:var(--warning)">Agent dropdown may be incomplete</div>
                <div class="text-xs text-dim" x-text="agentsLoadError"></div>
                <button class="btn btn-ghost btn-sm" style="margin-top:8px" @click="loadAgents()">Retry</button>
              </div>
              <template x-for="nt in nodeTypes" :key="nt.type">
                <div class="wf-palette-node" draggable="true" @dragstart="onPaletteDragStart(nt.type, $event)"
                     :style="'border-left: 3px solid ' + nt.color">
                  <span class="wf-palette-icon" :style="'background:' + nt.color" x-text="nt.icon"></span>
                  <span class="text-xs" x-text="nt.label"></span>
                </div>
              </template>
              <hr style="border-color:var(--border);margin:12px 0">
              <div class="text-xs text-dim mb-2">Workflow</div>
              <div class="form-group" style="margin-bottom:8px">
                <input class="form-input" x-model="workflowName" placeholder="Workflow name" style="font-size:11px">
              </div>
              <div class="form-group" style="margin-bottom:8px">
                <input class="form-input" x-model="workflowDescription" placeholder="Description" style="font-size:11px">
              </div>
              <div class="flex flex-col gap-1">
                <button class="btn btn-primary btn-sm btn-block" @click="generateToml()">Export TOML</button>
                <button class="btn btn-primary btn-sm btn-block" @click="showSaveModal = true">Save Workflow</button>
                <button class="btn btn-ghost btn-sm btn-block" @click="autoLayout()">Auto Layout</button>
                <button class="btn btn-ghost btn-sm btn-block" @click="clearCanvas()">Clear</button>
              </div>
            </div>

            <!-- Canvas -->
            <div class="wf-canvas-wrap">
              <!-- Zoom controls -->
              <div class="wf-zoom-controls">
                <button class="btn btn-ghost btn-sm" @click="zoomOut()" title="Zoom out">-</button>
                <span class="text-xs" x-text="Math.round(zoom * 100) + '%'" style="min-width:36px;text-align:center"></span>
                <button class="btn btn-ghost btn-sm" @click="zoomIn()" title="Zoom in">+</button>
                <button class="btn btn-ghost btn-sm" @click="zoomReset()" title="Reset view">Fit</button>
              </div>

              <svg id="wf-canvas" class="wf-canvas"
                   @mousedown="onCanvasMouseDown($event)"
                   @mousemove="onCanvasMouseMove($event)"
                   @mouseup="onCanvasMouseUp()"
                   @mouseleave="onCanvasMouseUp()"
                   @wheel.prevent="onCanvasWheel($event)"
                   @drop="onCanvasDrop($event)"
                   @dragover="onCanvasDragOver($event)">
                <g :transform="'translate(' + (canvasOffset.x * zoom) + ',' + (canvasOffset.y * zoom) + ') scale(' + zoom + ')'">
                  <!-- Grid pattern -->
                  <defs>
                    <pattern id="wf-grid" width="20" height="20" patternUnits="userSpaceOnUse">
                      <circle cx="1" cy="1" r="0.5" fill="var(--text-dim)" opacity="0.15"/>
                    </pattern>
                  </defs>
                  <rect x="-2000" y="-2000" width="6000" height="6000" fill="url(#wf-grid)"/>

                  <!-- Connections -->
                  <template x-for="conn in connections" :key="conn.id">
                    <g>
                      <path :d="getConnectionPath(conn)" fill="none" stroke="var(--text-dim)" stroke-width="2"
                            style="cursor:pointer" @click.stop="selectedConnection = conn"
                            :stroke="selectedConnection && selectedConnection.id === conn.id ? 'var(--accent)' : 'var(--text-dim)'"
                            :stroke-width="selectedConnection && selectedConnection.id === conn.id ? 3 : 2"/>
                      <!-- Arrow at midpoint -->
                    </g>
                  </template>

                  <!-- Connection preview line -->
                  <template x-if="connecting && connectPreview">
                    <path :d="getPreviewPath()" fill="none" stroke="var(--accent)" stroke-width="2" stroke-dasharray="6,3"/>
                  </template>

                  <!-- Nodes -->
                  <template x-for="node in nodes" :key="node.id">
                    <g class="wf-node" :transform="'translate(' + node.x + ',' + node.y + ')'"
                       @mousedown="onNodeMouseDown(node, $event)" @dblclick="editNode(node)">
                      <!-- Node body -->
                      <rect x="0" y="0" :width="node.width" :height="node.height" rx="8" ry="8"
                            :fill="selectedNode && selectedNode.id === node.id ? 'var(--card-bg)' : 'var(--bg-secondary)'"
                            :stroke="selectedNode && selectedNode.id === node.id ? node.color : 'var(--border)'"
                            stroke-width="2" style="cursor:grab"/>
                      <!-- Color accent bar -->
                      <rect x="0" y="0" width="6" :height="node.height" rx="3" ry="0" :fill="node.color"/>
                      <!-- Icon -->
                      <circle cx="28" :cy="node.height/2" r="14" :fill="node.color" opacity="0.15"/>
                      <text x="28" :y="node.height/2 + 4" text-anchor="middle" :fill="node.color"
                            style="font-size:12px;font-weight:700;pointer-events:none" x-text="node.icon"></text>
                      <!-- Label -->
                      <text x="50" :y="node.height/2 - 4" fill="var(--text)" style="font-size:12px;font-weight:600;pointer-events:none"
                            x-text="node.label"></text>
                      <!-- Sub-label (config hint) -->
                      <text x="50" :y="node.height/2 + 12" fill="var(--text-dim)" style="font-size:10px;pointer-events:none"
                            x-text="node.type === 'agent' ? (node.config.agent_name || 'No agent') :
                                    node.type === 'condition' ? (node.config.expression || 'No condition') :
                                    node.type === 'loop' ? ('max ' + (node.config.max_iterations || 5) + ' iters') :
                                    node.type === 'parallel' ? (node.config.fan_count + ' branches') :
                                    node.type === 'collect' ? node.config.strategy : ''"></text>

                      <!-- Input ports -->
                      <template x-for="pi in Array.from({length: node.ports.in}, function(_,i){return i})" :key="'in-'+pi">
                        <circle class="wf-port wf-port-in" :cx="node.width / (node.ports.in + 1) * (pi + 1)" cy="0" r="6"
                                fill="var(--bg-secondary)" stroke="var(--text-dim)" stroke-width="2"
                                @mouseup.stop="endConnect(node.id, pi, $event)"/>
                      </template>

                      <!-- Output ports -->
                      <template x-for="po in Array.from({length: node.ports.out}, function(_,i){return i})" :key="'out-'+po">
                        <circle class="wf-port wf-port-out" :cx="node.width / (node.ports.out + 1) * (po + 1)" :cy="node.height" r="6"
                                fill="var(--bg-secondary)" :stroke="node.color" stroke-width="2"
                                @mousedown.stop="startConnect(node.id, po, $event)"/>
                      </template>
                    </g>
                  </template>
                </g>
              </svg>

              <!-- Canvas hints -->
              <div class="wf-canvas-hint" x-show="nodes.length <= 1">
                Drag nodes from the palette onto the canvas. Connect output ports (bottom) to input ports (top). Double-click to edit.
              </div>
            </div>

            <!-- Node editor panel (right sidebar) -->
            <div class="wf-editor-panel" x-show="showNodeEditor && selectedNode" x-transition>
              <div class="wf-editor-header">
                <span class="font-bold text-sm" x-text="selectedNode ? selectedNode.label : ''"></span>
                <button class="btn btn-ghost btn-sm" @click="showNodeEditor = false">&times;</button>
              </div>
              <template x-if="selectedNode">
                <div>
                  <div class="form-group">
                    <label class="text-xs">Label</label>
                    <input class="form-input" x-model="selectedNode.label" style="font-size:11px">
                  </div>

                  <!-- Agent config -->
                  <template x-if="selectedNode.type === 'agent'">
                    <div>
                      <div class="form-group">
                        <label class="text-xs">Agent</label>
                        <select class="form-select" x-model="selectedNode.config.agent_name" style="font-size:11px">
                          <option value="">Select agent...</option>
                          <template x-if="selectedNode && selectedNode.config.agent_name && !hasAgentNameOption(selectedNode.config.agent_name)">
                            <option :value="selectedNode.config.agent_name" selected x-text="selectedNode.config.agent_name + ' (current)'"></option>
                          </template>
                          <template x-for="a in agents" :key="a.id || a.name">
                            <option :value="a.name" :selected="selectedNode && selectedNode.config.agent_name === a.name" x-text="a.name"></option>
                          </template>
                        </select>
                      </div>
                      <div class="form-group">
                        <label class="text-xs">Prompt Template</label>
                        <textarea class="form-textarea" x-model="selectedNode.config.prompt" style="font-size:11px;min-height:60px" placeholder="{{input}}"></textarea>
                      </div>
                      <div class="form-group">
                        <label class="text-xs">Model (optional)</label>
                        <input class="form-input" x-model="selectedNode.config.model" style="font-size:11px" placeholder="Default model">
                      </div>
                    </div>
                  </template>

                  <!-- Condition config -->
                  <template x-if="selectedNode.type === 'condition'">
                    <div>
                      <div class="form-group">
                        <label class="text-xs">Expression</label>
                        <input class="form-input" x-model="selectedNode.config.expression" style="font-size:11px" placeholder="output.contains('yes')">
                      </div>
                      <div class="text-xs text-dim">Top port = true, bottom port = false</div>
                    </div>
                  </template>

                  <!-- Loop config -->
                  <template x-if="selectedNode.type === 'loop'">
                    <div>
                      <div class="form-group">
                        <label class="text-xs">Max Iterations</label>
                        <input type="number" class="form-input" x-model.number="selectedNode.config.max_iterations" style="font-size:11px" min="1" max="100">
                      </div>
                      <div class="form-group">
                        <label class="text-xs">Until (stop condition)</label>
                        <input class="form-input" x-model="selectedNode.config.until" style="font-size:11px" placeholder="output === 'done'">
                      </div>
                    </div>
                  </template>

                  <!-- Parallel config -->
                  <template x-if="selectedNode.type === 'parallel'">
                    <div>
                      <div class="form-group">
                        <label class="text-xs">Fan-out Count</label>
                        <input type="number" class="form-input" x-model.number="selectedNode.config.fan_count" style="font-size:11px" min="2" max="10">
                      </div>
                    </div>
                  </template>

                  <!-- Collect config -->
                  <template x-if="selectedNode.type === 'collect'">
                    <div>
                      <div class="form-group">
                        <label class="text-xs">Strategy</label>
                        <select class="form-select" x-model="selectedNode.config.strategy" style="font-size:11px">
                          <option value="all">Wait for all</option>
                          <option value="first">First to finish</option>
                          <option value="majority">Majority vote</option>
                        </select>
                      </div>
                    </div>
                  </template>

                  <hr style="border-color:var(--border);margin:12px 0">
                  <div class="flex gap-2">
                    <button class="btn btn-ghost btn-sm" @click="duplicateNode(selectedNode)">Duplicate</button>
                    <button class="btn btn-danger btn-sm" @click="deleteNode(selectedNode.id)">Delete</button>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- Delete connection hint -->
          <div class="wf-conn-hint" x-show="selectedConnection" x-transition>
            <span class="text-xs">Connection selected</span>
            <button class="btn btn-danger btn-sm" @click="deleteConnection(selectedConnection.id)">Delete Connection</button>
          </div>

          <!-- TOML Preview modal -->
          <template x-if="showTomlPreview">
            <div class="modal-overlay" @click.self="showTomlPreview = false" @keydown.escape.window="showTomlPreview = false">
              <div class="modal" style="max-width:600px">
                <div class="modal-header"><h3>Generated TOML</h3><button class="modal-close" @click="showTomlPreview = false">&times;</button></div>
                <pre class="wf-toml-preview" x-text="tomlOutput"></pre>
                <button class="btn btn-ghost btn-block mt-2" @click="navigator.clipboard.writeText(tomlOutput); RustyHandToast.success('Copied!')">Copy to Clipboard</button>
              </div>
            </div>
          </template>

          <!-- Save modal -->
          <template x-if="showSaveModal">
            <div class="modal-overlay" @click.self="showSaveModal = false" @keydown.escape.window="showSaveModal = false">
              <div class="modal">
                <div class="modal-header"><h3>Save Workflow</h3><button class="modal-close" @click="showSaveModal = false">&times;</button></div>
                <div class="form-group"><label>Name</label><input class="form-input" x-model="workflowName" placeholder="my-workflow"></div>
                <div class="form-group"><label>Description</label><input class="form-input" x-model="workflowDescription" placeholder="What does this workflow do?"></div>
                <div class="text-xs text-dim mb-4" x-text="nodes.filter(function(n){return n.type!=='start'&&n.type!=='end'}).length + ' steps, ' + connections.length + ' connections'"></div>
                <button class="btn btn-primary btn-block" @click="saveWorkflow()">Save</button>
              </div>
            </div>
          </template>
        </div>
        </template>
      </div>
    </template>

    <!-- Page: Automation -->
    <template x-if="page === 'automation'">
      <div x-data="automationPage()">
        <div class="page-header" style="margin-bottom:0">
          <div class="flex items-center gap-3">
            <h2 style="margin:0;font-size:18px">Automation</h2>
            <span class="badge badge-success" x-show="jobCount()" x-text="jobCount() + ' active'"></span>
            <span class="badge badge-dim" x-show="jobs.length - jobCount()" x-text="(jobs.length - jobCount()) + ' paused'"></span>
          </div>
          <div class="flex gap-2 items-center">
            <select class="form-select" style="width:160px;font-size:12px" x-show="tab === 'jobs'" x-model="filterAgentId" @change="loadJobs()">
              <option value="">All agents</option>
              <template x-for="a in availableAgents" :key="a.id">
                <option :value="a.id" x-text="a.name"></option>
              </template>
            </select>
            <button class="btn btn-primary btn-sm" x-show="tab === 'jobs'" @click="openCreateForm()">+ New Job</button>
          </div>
        </div>
        <div class="tabs" role="tablist">
          <div class="tab" role="tab" :class="{ active: tab === 'jobs' }" @click="tab = 'jobs'">
            Jobs <span class="badge badge-dim" x-show="jobs.length" x-text="jobCount() + '/' + jobs.length + ' active'" style="margin-left:4px"></span>
          </div>
          <div class="tab" role="tab" :class="{ active: tab === 'triggers' }" @click="tab = 'triggers'; if (!triggers.length && !trigLoading) loadTriggers()">
            Event Triggers <span class="badge badge-dim" x-show="triggers.length" x-text="triggers.length" style="margin-left:4px"></span>
          </div>
          <div class="tab" :class="{ active: tab === 'history' }" @click="tab = 'history'; loadHistory()">
            Run History
          </div>
        </div>
        <div class="page-body" x-init="loadData()">

          <!-- ── TAB: Jobs ── -->
          <div x-show="tab === 'jobs'">
            <div x-show="loading"><div class="skeleton-table-rows"><div class="skeleton-table-header"><div class="skeleton-line-sm" style="width:20%;margin:0"></div><div class="skeleton-line-sm" style="width:25%;margin:0"></div><div class="skeleton-line-sm" style="width:15%;margin:0"></div><div class="skeleton-line-sm" style="width:10%;margin:0"></div></div><div class="skeleton-table-row"><div class="skeleton-line" style="width:22%;margin:0"></div><div class="skeleton-line" style="width:20%;margin:0"></div><div class="skeleton-badge"></div><div class="skeleton-toggle"></div></div><div class="skeleton-table-row"><div class="skeleton-line" style="width:18%;margin:0"></div><div class="skeleton-line" style="width:24%;margin:0"></div><div class="skeleton-badge"></div><div class="skeleton-toggle"></div></div><div class="skeleton-table-row"><div class="skeleton-line" style="width:20%;margin:0"></div><div class="skeleton-line" style="width:22%;margin:0"></div><div class="skeleton-badge"></div><div class="skeleton-toggle"></div></div></div></div>
            <div x-show="!loading && loadError" class="error-state">
              <span class="error-icon">!</span>
              <p x-text="loadError"></p>
              <button class="btn btn-ghost btn-sm" @click="loadData()">Retry</button>
            </div>
            <div x-show="!loading && !loadError">
              <!-- Jobs Table -->
              <div class="table-wrap" x-show="jobs.length">
                <table>
                  <thead>
                    <tr>
                      <th>Name</th>
                      <th>Type</th>
                      <th>Schedule</th>
                      <th>Agent</th>
                      <th>Delivery</th>
                      <th>Status</th>
                      <th>Next Run</th>
                      <th>Last Run</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="job in filteredJobs" :key="jobId(job)">
                      <tr>
                        <td>
                          <span class="font-bold" x-text="job.name || '(unnamed)'"></span>
                          <div class="text-xs text-dim" x-show="actionPreview(job)"
                               x-text="actionPreview(job)"
                               :title="actionPreviewFull(job)"></div>
                        </td>
                        <td>
                          <span class="badge badge-dim" style="font-size:10px" x-text="scheduleTypeName(job.schedule && job.schedule.kind)"></span>
                        </td>
                        <td>
                          <code style="font-size:11px;color:var(--accent)" x-text="scheduleCode(job)"></code>
                          <div class="text-xs text-dim" x-text="describeJobSchedule(job)"></div>
                        </td>
                        <td class="truncate" style="max-width:110px" x-text="jobAgentLabel(job)"></td>
                        <td class="text-xs" x-text="deliveryDesc(job)"></td>
                        <td>
                          <span class="badge" :class="job.enabled ? 'badge-success' : 'badge-dim'" x-text="job.enabled ? 'Active' : 'Paused'"></span>
                        </td>
                        <td class="text-xs" :title="formatTime(job.next_run)" x-text="nextRunText(job)"></td>
                        <td class="text-xs" :title="formatTime(job.last_run)" x-text="relativeTime(job.last_run)"></td>
                        <td>
                          <div class="flex gap-1">
                            <button class="btn btn-ghost btn-sm" @click="editJob(job)" title="Edit">Edit</button>
                            <button class="btn btn-ghost btn-sm" @click="toggleJob(job)" x-text="job.enabled ? 'Pause' : 'Enable'"></button>
                            <button class="btn btn-danger btn-sm" @click="deleteJob(job)">Del</button>
                          </div>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>

              <!-- Empty State -->
              <div class="empty-state" x-show="!jobs.length">
                <div class="empty-state-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
                <h4>No automation jobs</h4>
                <p class="hint">Create automation jobs to run agents on a recurring cadence. Jobs persist across restarts.</p>
                <button class="btn btn-primary mt-4" @click="openCreateForm()">+ Create Job</button>
              </div>
            </div>

            <!-- Create/Edit Job Modal -->
            <template x-if="showJobForm">
              <div class="modal-overlay" @click.self="showJobForm = false" @keydown.escape.window="showJobForm = false">
                <div class="modal" style="max-width:520px;overflow-x:hidden">
                  <div class="modal-header">
                    <h3 x-text="editingJobId ? 'Edit Job' : 'New Job'"></h3>
                    <button class="modal-close" @click="showJobForm = false">&times;</button>
                  </div>

                  <!-- Row: Name + Agent -->
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                    <div class="form-group">
                      <label>Name</label>
                      <input class="form-input" x-model="jobForm.name" placeholder="daily-report">
                    </div>
                    <div class="form-group">
                      <label>Agent <span style="color:var(--danger)">*</span></label>
                      <select class="form-select" x-model="jobForm.agent_id" x-ref="scheduleAgentSelect">
                        <option value="" :selected="!jobForm.agent_id">Select...</option>
                        <template x-if="jobForm.agent_id && _editingAgentName && !hasAgentOption(jobForm.agent_id)">
                          <option :value="jobForm.agent_id" selected x-text="_editingAgentName + ' (current)'"></option>
                        </template>
                        <template x-for="a in availableAgents" :key="a.id">
                          <option :value="a.id" :selected="normalizeAgentId(jobForm.agent_id) === normalizeAgentId(a.id)" x-text="a.name"></option>
                        </template>
                      </select>
                      <div class="text-xs" style="color:var(--accent);margin-top:4px" x-show="!jobForm.agent_id && _editingAgentName" x-text="'Linked to: ' + _editingAgentName + ' (not running)'"></div>
                    </div>
                  </div>

                  <!-- Section: When -->
                  <div style="border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:12px">
                    <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);margin-bottom:8px">When</div>

                    <div class="flex gap-1" style="margin-bottom:10px">
                      <button class="btn btn-sm" :class="jobForm.schedule_type === 'cron' ? 'btn-primary' : 'btn-ghost'" @click="jobForm.schedule_type = 'cron'; jobForm.one_shot = false">Cron</button>
                      <button class="btn btn-sm" :class="jobForm.schedule_type === 'every' ? 'btn-primary' : 'btn-ghost'" @click="jobForm.schedule_type = 'every'; jobForm.one_shot = false">Interval</button>
                      <button class="btn btn-sm" :class="jobForm.schedule_type === 'at' ? 'btn-primary' : 'btn-ghost'" @click="jobForm.schedule_type = 'at'; jobForm.one_shot = true">One-time</button>
                    </div>

                    <!-- Cron -->
                    <div x-show="jobForm.schedule_type === 'cron'">
                      <input class="form-input" x-model="jobForm.cron_expr" placeholder="0 9 * * 1-5" style="font-family:monospace;margin-bottom:6px">
                      <div class="text-xs" style="color:var(--accent);margin-bottom:6px" x-show="jobForm.cron_expr" x-text="describeCron(jobForm.cron_expr)"></div>
                      <div style="display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:4px;overflow:hidden">
                        <template x-for="preset in cronPresets" :key="preset.cron">
                          <button style="font-size:10px;padding:4px 2px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;overflow:hidden;text-overflow:ellipsis;transition:all .15s;min-width:0;line-height:1.2;text-align:center" :style="jobForm.cron_expr === preset.cron ? 'background:var(--accent);color:#fff;border-color:var(--accent)' : ''" @click="applyCronPreset(preset)" x-text="preset.label" :title="preset.cron + ' — ' + preset.label"></button>
                        </template>
                      </div>
                    </div>

                    <!-- Interval -->
                    <div x-show="jobForm.schedule_type === 'every'">
                      <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:4px;margin-bottom:8px;overflow:hidden">
                        <template x-for="preset in intervalPresets" :key="preset.secs">
                          <button style="font-size:10px;padding:4px 2px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s;min-width:0;text-align:center" :style="jobForm.every_secs === preset.secs ? 'background:var(--accent);color:#fff;border-color:var(--accent)' : ''" @click="applyIntervalPreset(preset)" x-text="preset.label"></button>
                        </template>
                      </div>
                      <div class="flex gap-2 items-center">
                        <input class="form-input" type="number" min="60" max="86400" x-model.number="jobForm.every_secs" style="width:90px">
                        <span class="text-xs text-dim">sec</span>
                        <span class="text-xs" style="color:var(--accent)" x-text="describeInterval(jobForm.every_secs)"></span>
                      </div>
                    </div>

                    <!-- One-time -->
                    <div x-show="jobForm.schedule_type === 'at'">
                      <input class="form-input" type="datetime-local" x-model="jobForm.at_datetime">
                      <div class="text-xs text-dim" style="margin-top:4px">UTC, must be in the future</div>
                    </div>
                  </div>

                  <!-- Section: What -->
                  <div style="border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:12px">
                    <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);margin-bottom:8px">What</div>

                    <div class="flex gap-1" style="margin-bottom:10px">
                      <button class="btn btn-sm" :class="jobForm.action_type === 'agent_turn' ? 'btn-primary' : 'btn-ghost'" @click="jobForm.action_type = 'agent_turn'">Send Message</button>
                      <button class="btn btn-sm" :class="jobForm.action_type === 'system_event' ? 'btn-primary' : 'btn-ghost'" @click="jobForm.action_type = 'system_event'">System Event</button>
                      <button class="btn btn-sm" :class="jobForm.action_type === 'workflow_run' ? 'btn-primary' : 'btn-ghost'" @click="jobForm.action_type = 'workflow_run'">Run Workflow</button>
                    </div>

                    <div x-show="jobForm.action_type === 'agent_turn'">
                      <textarea class="form-textarea" x-model="jobForm.message" placeholder="Generate and email the daily status report..." rows="3" style="margin-bottom:8px"></textarea>
                      <div style="display:grid;grid-template-columns:1fr 100px;gap:8px">
                        <input class="form-input" x-model="jobForm.model_override" placeholder="Model override (optional)" style="font-size:12px">
                        <input class="form-input" type="number" min="10" max="600" x-model.number="jobForm.timeout_secs" title="Timeout in seconds" style="font-size:12px">
                      </div>
                      <div class="text-xs text-dim" style="margin-top:4px">Model override (optional) | Timeout sec (10-600)</div>
                    </div>

                    <div x-show="jobForm.action_type === 'system_event'">
                      <textarea class="form-textarea" x-model="jobForm.event_text" placeholder="Event payload text..." rows="2"></textarea>
                    </div>

                    <div x-show="jobForm.action_type === 'workflow_run'">
                      <select class="form-select" x-model="jobForm.workflow_id" style="margin-bottom:8px">
                        <option value="">Select a workflow...</option>
                        <template x-for="wf in workflows" :key="wf.id">
                          <option :value="wf.id" x-text="wf.name + (wf.description ? ' — ' + wf.description : '')"></option>
                        </template>
                      </select>
                      <textarea class="form-textarea" x-model="jobForm.workflow_input" placeholder="Input passed to the workflow (string)..." rows="3" style="margin-bottom:8px"></textarea>
                      <div class="flex items-center gap-2">
                        <input class="form-input" type="number" min="10" max="600" x-model.number="jobForm.timeout_secs" title="Timeout in seconds" style="width:100px;font-size:12px">
                        <span class="text-xs text-dim">Timeout sec (10-600)</span>
                      </div>
                      <div class="text-xs text-dim" style="margin-top:6px" x-show="!workflows.length">
                        No workflows defined yet — create one on the <a href="#workflows" style="color:var(--accent)">Workflows</a> page first.
                      </div>
                    </div>
                  </div>

                  <!-- Section: Delivery (collapsed by default) -->
                  <div style="border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px">
                    <div style="padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none" @click="jobForm._showDelivery = !jobForm._showDelivery">
                      <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted)">Delivery <span class="text-xs" style="font-weight:400;text-transform:none;letter-spacing:0" x-text="jobForm.delivery_type === 'none' ? '' : '(' + deliveryTypeName(jobForm.delivery_type) + ')'"></span></span>
                      <span style="font-size:9px;color:var(--text-muted)" x-text="jobForm._showDelivery ? '\u25B2' : '\u25BC'"></span>
                    </div>
                    <div x-show="jobForm._showDelivery" x-transition style="padding:0 12px 12px">
                      <select class="form-select" x-model="jobForm.delivery_type" style="margin-bottom:8px">
                        <option value="none">None (fire and forget)</option>
                        <option value="last_channel">Last channel used by agent</option>
