                        <option value="channel">Specific channel</option>
                        <option value="webhook">Webhook URL</option>
                      </select>
                      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" x-show="jobForm.delivery_type === 'channel'">
                        <input class="form-input" x-model="jobForm.delivery_channel" placeholder="Channel (telegram, slack...)" style="font-size:12px">
                        <input class="form-input" x-model="jobForm.delivery_to" placeholder="Recipient" style="font-size:12px">
                      </div>
                      <div x-show="jobForm.delivery_type === 'webhook'">
                        <input class="form-input" x-model="jobForm.webhook_url" placeholder="https://example.com/hook" style="font-size:12px">
                      </div>
                    </div>
                  </div>

                  <!-- Footer: toggles + submit -->
                  <div class="flex items-center" style="gap:16px;margin-bottom:12px">
                    <label class="flex items-center gap-2" style="cursor:pointer">
                      <div class="toggle" :class="{ active: jobForm.enabled }" @click="jobForm.enabled = !jobForm.enabled"></div>
                      <span class="text-xs" x-text="jobForm.enabled ? 'Enabled' : 'Paused'"></span>
                    </label>
                    <label class="flex items-center gap-2" style="cursor:pointer" x-show="jobForm.schedule_type !== 'at'">
                      <div class="toggle" :class="{ active: jobForm.one_shot }" @click="jobForm.one_shot = !jobForm.one_shot"></div>
                      <span class="text-xs">One-shot</span>
                    </label>
                  </div>

                  <button class="btn btn-primary btn-block" @click="saveJob()" :disabled="saving">
                    <span x-show="!saving" x-text="editingJobId ? 'Update Job' : 'Create Job'"></span>
                    <span x-show="saving">Saving...</span>
                  </button>
                </div>
              </div>
            </template>
          </div>

          <!-- ── TAB: Event Triggers ── -->
          <div x-show="tab === 'triggers'">
            <div x-show="trigLoading"><div class="skeleton-table-rows"><div class="skeleton-table-header"><div class="skeleton-line-sm" style="width:20%;margin:0"></div><div class="skeleton-line-sm" style="width:25%;margin:0"></div><div class="skeleton-line-sm" style="width:15%;margin:0"></div></div><div class="skeleton-table-row"><div class="skeleton-line" style="width:22%;margin:0"></div><div class="skeleton-line" style="width:28%;margin:0"></div><div class="skeleton-badge"></div></div><div class="skeleton-table-row"><div class="skeleton-line" style="width:18%;margin:0"></div><div class="skeleton-line" style="width:24%;margin:0"></div><div class="skeleton-badge"></div></div><div class="skeleton-table-row"><div class="skeleton-line" style="width:20%;margin:0"></div><div class="skeleton-line" style="width:26%;margin:0"></div><div class="skeleton-badge"></div></div></div></div>
            <div x-show="!trigLoading && trigLoadError" class="error-state">
              <span class="error-icon">!</span>
              <p x-text="trigLoadError"></p>
              <button class="btn btn-ghost btn-sm" @click="loadTriggers()">Retry</button>
            </div>
            <div x-show="!trigLoading && !trigLoadError">
              <div class="card mb-4" style="border-left:3px solid var(--accent)">
                <div class="font-bold" style="font-size:13px;margin-bottom:4px">Event Triggers</div>
                <div class="text-sm text-dim" style="line-height:1.6">
                  Event triggers fire agents in response to system events (agent lifecycle, memory updates, custom events).
                  Create and manage triggers on the <a href="#workflows" style="color:var(--accent)">Workflows</a> page.
                  This view shows all active triggers for monitoring.
                </div>
              </div>
              <div class="table-wrap" x-show="triggers.length">
                <table>
                  <thead><tr><th>Agent</th><th>Pattern</th><th>Prompt</th><th>Fires</th><th>Enabled</th><th>Created</th><th>Actions</th></tr></thead>
                  <tbody>
                    <template x-for="t in triggers" :key="t.id">
                      <tr>
                        <td class="font-bold truncate" style="max-width:120px" x-text="agentName(t.agent_id)" :title="t.agent_id"></td>
                        <td><span class="badge badge-created trigger-type" x-text="triggerType(t.pattern)"></span></td>
                        <td class="truncate text-xs text-dim" style="max-width:180px" x-text="t.prompt_template" :title="t.prompt_template"></td>

          <!-- Setup modal — 3-step flow (Configure → Verify → Ready) -->

                  </div>
                  <div class="channel-step-line" :class="{ done: setupStep > 1 }"></div>

                    <button class="btn btn-primary btn-sm" @click="setupModal = null">Done</button>
                  </div>
                </div>

                <!-- Form flow (Configure / Verify) -->
                <template x-if="!(setupStep === 3 && testPassed)">
                  <div>
                    <!-- Quick setup steps (collapsed, minimal) -->

                          <div>
                            <template x-for="f in advancedFields()" :key="f.key">

                                <template x-if="f.type === 'secret'">
                                  <input class="form-input" type="password"
                                         x-model="formValues[f.key]"
                                         :placeholder="f.has_value ? '••••••• (set)' : f.placeholder">
                                </template>
                                <template x-if="f.type === 'number'">
                                  <input class="form-input" type="number"
                                         x-model="formValues[f.key]"
                                         :placeholder="f.placeholder">
                                </template>
                                <template x-if="f.type === 'text' || f.type === 'list'">
                                  <input class="form-input" type="text"
                                         x-model="formValues[f.key]"
                                         :placeholder="f.type === 'list' ? f.placeholder + ' (comma-separated)' : f.placeholder">
                                </template>
                              </div>
                            </template>
                          </div>
                        </template>
                      </div>
                    </template>

                    <!-- Action buttons -->
                    <div class="flex gap-2 mt-4" style="flex-wrap:wrap">

            </div>
          </template>
        </div>

              <p class="mt-2" style="font-size:0.8rem;color:var(--text-dim)">Configure MCP servers in your <code>config.toml</code> under <code>[mcp_servers]</code>.</p>
            </div>
            <div x-show="mcpLoading" class="skeleton-card-grid"><div class="skeleton-card-item"><div class="skeleton-circle"></div><div class="skeleton-line-lg"></div><div class="skeleton-line"></div></div><div class="skeleton-card-item"><div class="skeleton-circle"></div><div class="skeleton-line-lg"></div><div class="skeleton-line"></div></div><div class="skeleton-card-item"><div class="skeleton-circle"></div><div class="skeleton-line-lg"></div><div class="skeleton-line"></div></div><div class="skeleton-card-item"><div class="skeleton-circle"></div><div class="skeleton-line-lg"></div><div class="skeleton-line"></div></div></div>
            <div x-show="!mcpLoading">
              <!-- Connected servers -->
              <div x-show="mcpServers.total_connected > 0" class="mb-4">
                <div class="text-sm font-bold mb-2" style="color:var(--text-dim);letter-spacing:0.5px">CONNECTED SERVERS</div>
                <div class="card-grid">
                  <template x-for="srv in mcpServers.connected" :key="srv.name">

                      </div>
                    </div>
                  </template>
                </div>
              </div>

name = "filesystem"
timeout_secs = 30

[mcp_servers.transport]
type = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/path"]</pre>
                <p class="hint mt-2" style="font-size:0.75rem">RustyHand supports all OpenClaw-compatible MCP servers.</p>
              </div>
            </div>
          </div>

        <!-- Install skill modal -->
        <template x-if="installOpen">
          <div class="modal-overlay" @click.self="installOpen = false" @keydown.escape.window="installOpen = false">
            <div class="modal" style="max-width:640px;max-height:85vh;overflow-y:auto">
              <div class="modal-header">
                <h3>Install custom skill</h3>
                <button class="modal-close" @click="installOpen = false">&times;</button>
              </div>
              <p class="text-dim" style="font-size:12px;margin:0 0 12px">
                Install a new Python or Node skill into <code>~/.rustyhand/skills/</code>. Your code runs as a subprocess; <code>input</code> is the JSON tool arguments and the return value is sent back to the agent.
              </p>
              <div style="display:grid;grid-template-columns:1fr 180px;gap:12px">
                <div class="form-group">
                  <label>Name</label>
                  <input class="form-input" type="text" x-model="installForm.name" placeholder="my_custom_skill" maxlength="64">
                  <div class="text-xs text-dim" style="margin-top:4px">Lowercase, digits, underscore. Must start with a letter.</div>
                </div>
                <div class="form-group">
                  <label>Language</label>
                  <select class="form-select" x-model="installForm.language" @change="onLanguageChange()">
                    <option value="python">Python</option>
                    <option value="node">Node.js</option>
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label>Description</label>
                <input class="form-input" type="text" x-model="installForm.description" placeholder="What this skill does">
              </div>
              <div class="form-group">
                <label>Code</label>
                <textarea class="form-input" x-model="installForm.content" rows="12" style="font-family:monospace;font-size:12px;white-space:pre"></textarea>
                <div class="text-xs text-dim" style="margin-top:4px" x-show="installForm.language === 'python'">
                  Define <code>def run(input):</code> &mdash; return any JSON-serialisable value.
                </div>
                <div class="text-xs text-dim" style="margin-top:4px" x-show="installForm.language === 'node'">
                  Define <code>function run(input) { ... }</code> or <code>async function run(input)</code>.
                </div>
              </div>
              <label class="flex items-center gap-2" style="margin:8px 0 16px">
                <input type="checkbox" x-model="installForm.overwrite">
                <span class="text-sm">Overwrite if a skill with this name already exists</span>
              </label>
              <div class="flex gap-2 justify-end">
                <button class="btn btn-ghost" @click="installOpen = false" :disabled="installSaving">Cancel</button>
                <button class="btn btn-primary" @click="submitInstall()" :disabled="installSaving">
                  <span x-show="!installSaving">Install skill</span>
                  <span x-show="installSaving">Installing...</span>
                </button>
              </div>
            </div>
          </div>
        </template>
      </div>
    </template>

    <!-- Page: Knowledge Graph -->
    <template x-if="page === 'knowledge'">
      <div x-data="knowledgePage" x-init="init()">
        <div class="page-header">
          <div class="flex items-center gap-3">
            <h2 style="margin:0;font-size:18px">Knowledge Graph</h2>
            <span class="badge badge-dim" x-text="nodes.length + ' entities'"></span>
            <span class="badge badge-dim" x-text="edges.length + ' relations'"></span>
            <button class="btn btn-ghost btn-sm" @click="refresh()">Refresh</button>
          </div>
          <p class="text-dim" style="font-size:12px;margin-top:4px">Entities and relations discovered by agents</p>
        </div>

        <div class="page-body" style="padding:24px">
          <div x-show="loading" style="text-align:center;padding:48px;color:var(--text-muted)">Loading knowledge graph...</div>
          <div x-show="error" style="padding:24px;color:var(--error)" x-text="error"></div>

          <template x-if="!loading && !error">
            <div>
              <!-- Empty state -->
              <template x-if="nodes.length === 0">
                <div style="text-align:center;padding:64px 24px;color:var(--text-muted)">
                  <div style="font-size:48px;margin-bottom:16px">&#128300;</div>
                  <h3 style="font-size:16px;margin-bottom:8px;color:var(--text-dim)">No knowledge yet</h3>
                  <p style="font-size:13px;max-width:400px;margin:0 auto">Agents build the knowledge graph automatically as they work. Use the <code>knowledge_add_entity</code> and <code>knowledge_add_relation</code> tools to add entities manually.</p>
                </div>
              </template>

              <!-- Graph content -->
              <template x-if="nodes.length > 0">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
                  <!-- Entities by type -->
                  <div class="card" style="padding:20px">
                    <h3 style="font-size:14px;margin-bottom:16px">Entities</h3>
                    <template x-for="(type, typeName) in nodeTypes()" :key="typeName">
                      <div style="margin-bottom:16px">
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
                          <div style="width:10px;height:10px;border-radius:50%" :style="'background:' + typeColor(typeName)"></div>
                          <span style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em" x-text="typeName"></span>
                          <span class="badge badge-dim" style="font-size:10px" x-text="type.length"></span>
                        </div>
                        <template x-for="node in type" :key="node.id">
                          <div @click="selectNode(node)" style="padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:4px;transition:background 0.15s"
                               :style="selectedNode === node ? 'background:var(--accent-glow);border-left:3px solid var(--accent)' : 'border-left:3px solid transparent'"
                               @mouseenter="$el.style.background = selectedNode === node ? '' : 'var(--surface2)'" @mouseleave="$el.style.background = selectedNode === node ? 'var(--accent-glow)' : ''">
                            <div style="font-size:13px;font-weight:500" x-text="node.name"></div>
                            <div style="font-size:11px;color:var(--text-muted)" x-text="Object.keys(node.properties || {}).map(k => k + ': ' + JSON.stringify(node.properties[k])).join(', ')"></div>
                          </div>
                        </template>
                      </div>
                    </template>
                  </div>

                  <!-- Relations / Detail panel -->
                  <div>
                    <!-- Selected node detail -->
                    <template x-if="selectedNode">
                      <div class="card" style="padding:20px;margin-bottom:16px">
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
                          <div style="width:12px;height:12px;border-radius:50%" :style="'background:' + typeColor(selectedNode.type)"></div>
                          <h3 style="font-size:16px;margin:0" x-text="selectedNode.name"></h3>
                          <span class="badge badge-dim" x-text="selectedNode.type"></span>
                        </div>
                        <div style="font-size:12px;color:var(--text-dim);margin-bottom:12px" x-text="'ID: ' + selectedNode.id"></div>

                        <h4 style="font-size:12px;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-muted);margin-bottom:8px">Connections</h4>
                        <template x-for="conn in connectedNames(selectedNode.id)" :key="conn.name + conn.relation">
                          <div style="padding:6px 0;border-bottom:1px solid var(--border-subtle);font-size:13px;display:flex;gap:8px;align-items:center">
                            <span style="color:var(--text-muted);font-size:11px" x-text="conn.direction === 'out' ? '\u2192' : '\u2190'"></span>
                            <span class="font-mono" style="font-size:11px;color:var(--accent)" x-text="conn.relation"></span>
                            <span x-text="conn.name"></span>
                          </div>
                        </template>
                        <div x-show="connectedNames(selectedNode.id).length === 0" style="font-size:12px;color:var(--text-muted)">No connections</div>
                      </div>
                    </template>

                    <!-- All relations table -->
                    <div class="card" style="padding:20px">
                      <h3 style="font-size:14px;margin-bottom:16px">Relations</h3>
                      <template x-if="edges.length === 0">
                        <div style="font-size:13px;color:var(--text-muted)">No relations yet</div>
                      </template>
                      <template x-if="edges.length > 0">
                        <table class="table" style="width:100%">
                          <thead><tr><th>Source</th><th>Relation</th><th>Target</th></tr></thead>
                          <tbody>
                            <template x-for="e in edges" :key="e.id">
                              <tr>
                                <td style="font-size:12px" x-text="(nodes.find(n => n.id === e.source) || {}).name || e.source"></td>
                                <td class="font-mono" style="font-size:11px;color:var(--accent)" x-text="e.type"></td>
                                <td style="font-size:12px" x-text="(nodes.find(n => n.id === e.target) || {}).name || e.target"></td>
                              </tr>
                            </template>
                          </tbody>
                        </table>
                      </template>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Page: Analytics -->
    <template x-if="page === 'analytics'">
      <div x-data="analyticsPage" x-init="init()">
        <div class="page-header">
          <div class="flex items-center gap-3">
            <h2 style="margin:0;font-size:18px">Analytics</h2>
            <button class="btn btn-ghost btn-sm" @click="refresh()">Refresh</button>
          </div>
          <p class="text-dim" style="font-size:12px;margin-top:4px">Cost tracking, usage breakdown, and agent performance</p>
        </div>

        <div class="page-body" style="padding:24px">
          <!-- Loading -->
          <div x-show="loading" style="text-align:center;padding:48px;color:var(--text-muted)">Loading analytics...</div>
          <div x-show="error" style="padding:24px;color:var(--error)" x-text="error"></div>

          <template x-if="!loading && !error && summary">
            <div>
              <!-- Summary Cards -->
              <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px">
                <div class="card" style="padding:16px">
                  <div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em">Today's Cost</div>
                  <div class="stat-value" style="font-size:24px;margin-top:4px" x-text="usd(summary.today_cost || summary.cost_today)"></div>
                </div>
                <div class="card" style="padding:16px">
                  <div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em">Total Tokens</div>
                  <div class="stat-value" style="font-size:24px;margin-top:4px" x-text="fmt(summary.total_tokens)"></div>
                </div>
                <div class="card" style="padding:16px">
                  <div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em">API Calls</div>
                  <div class="stat-value" style="font-size:24px;margin-top:4px" x-text="fmt(summary.total_calls || summary.call_count)"></div>
                </div>
                <div class="card" style="padding:16px">
                  <div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em">Total Cost</div>
                  <div class="stat-value" style="font-size:24px;margin-top:4px" x-text="usd(summary.total_cost)"></div>
                </div>
              </div>

              <!-- Budget Status -->
              <template x-if="budget && (budget.max_daily_usd > 0 || budget.max_monthly_usd > 0)">
                <div class="card" style="padding:20px;margin-bottom:24px">
                  <h3 style="font-size:14px;margin-bottom:16px">Budget</h3>
                  <div style="display:flex;gap:24px;flex-wrap:wrap">
                    <template x-if="budget.max_daily_usd > 0">
                      <div style="flex:1;min-width:200px">
                        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
                          <span>Daily</span>
                          <span x-text="usd(budget.daily_spend || 0) + ' / ' + usd(budget.max_daily_usd)"></span>
                        </div>
                        <div style="height:6px;background:var(--surface2);border-radius:3px;overflow:hidden">
                          <div style="height:100%;border-radius:3px;transition:width 0.3s"
                               :style="'width:' + (budgetPct(budget.daily_spend || 0, budget.max_daily_usd) || 0) + '%;background:' + ((budgetPct(budget.daily_spend || 0, budget.max_daily_usd) || 0) > 80 ? 'var(--error)' : 'var(--accent)')"></div>
                        </div>
                      </div>
                    </template>
                    <template x-if="budget.max_monthly_usd > 0">
                      <div style="flex:1;min-width:200px">
                        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
                          <span>Monthly</span>
                          <span x-text="usd(budget.monthly_spend || 0) + ' / ' + usd(budget.max_monthly_usd)"></span>
                        </div>
                        <div style="height:6px;background:var(--surface2);border-radius:3px;overflow:hidden">
                          <div style="height:100%;border-radius:3px;transition:width 0.3s"
                               :style="'width:' + (budgetPct(budget.monthly_spend || 0, budget.max_monthly_usd) || 0) + '%;background:' + ((budgetPct(budget.monthly_spend || 0, budget.max_monthly_usd) || 0) > 80 ? 'var(--error)' : 'var(--accent)')"></div>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
              </template>

              <!-- Daily Cost Chart (CSS bars) -->
              <template x-if="daily.length > 0">
                <div class="card" style="padding:20px;margin-bottom:24px">
                  <h3 style="font-size:14px;margin-bottom:16px">Daily Cost (Last 7 Days)</h3>
                  <div style="display:flex;align-items:flex-end;gap:8px;height:120px">
                    <template x-for="day in daily" :key="day.date">
                      <div style="flex:1;display:flex;flex-direction:column;align-items:center;height:100%">
                        <div style="flex:1;width:100%;display:flex;align-items:flex-end">
                          <div style="width:100%;background:var(--accent);border-radius:4px 4px 0 0;min-height:2px;transition:height 0.3s"
                               :style="'height:' + Math.max(2, (day.cost / maxDailyCost()) * 100) + '%'"></div>
                        </div>
                        <div style="font-size:10px;color:var(--text-muted);margin-top:6px" x-text="day.date ? day.date.slice(5) : ''"></div>
                        <div style="font-size:10px;color:var(--text-dim)" x-text="usd(day.cost)"></div>
                      </div>
                    </template>
                  </div>
                </div>
              </template>

              <!-- By Model Table -->
              <template x-if="byModel.length > 0">
                <div class="card" style="padding:20px;margin-bottom:24px">
                  <h3 style="font-size:14px;margin-bottom:16px">Cost by Model</h3>
                  <table class="table" style="width:100%">
                    <thead><tr><th>Model</th><th style="text-align:right">Calls</th><th style="text-align:right">Tokens</th><th style="text-align:right">Cost</th></tr></thead>
                    <tbody>
                      <template x-for="m in byModel" :key="m.model">
                        <tr>
                          <td class="font-mono" style="font-size:12px" x-text="m.model"></td>
                          <td style="text-align:right" x-text="fmt(m.calls || m.call_count)"></td>
                          <td style="text-align:right" x-text="fmt(m.tokens || m.total_tokens)"></td>
                          <td style="text-align:right;font-weight:600" x-text="usd(m.cost || m.total_cost)"></td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
              </template>

              <!-- Top Agents by Cost -->
              <template x-if="agentCosts.length > 0">
                <div class="card" style="padding:20px">
                  <h3 style="font-size:14px;margin-bottom:16px">Agent Costs</h3>
                  <table class="table" style="width:100%">
                    <thead><tr><th>Agent</th><th style="text-align:right">Cost</th><th style="width:40%"></th></tr></thead>
                    <tbody>
                      <template x-for="a in agentCosts" :key="a.agent_id || a.name">
                        <tr>
                          <td x-text="a.name || a.agent_id"></td>
                          <td style="text-align:right;font-weight:600" x-text="usd(a.total_cost || a.cost)"></td>
                          <td>
                            <div style="height:6px;background:var(--surface2);border-radius:3px;overflow:hidden">
                              <div style="height:100%;background:var(--accent);border-radius:3px"
                                   :style="'width:' + Math.max(2, ((a.total_cost || a.cost || 0) / maxAgentCost()) * 100) + '%'"></div>
                            </div>
                          </td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
              </template>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Page: Settings -->
    <template x-if="page === 'settings'">
      <div x-data="settingsPage">
        <div class="page-header" style="margin-bottom:0">
          <div class="flex items-center gap-3">
            <h2 style="margin:0;font-size:18px">Settings</h2>
            <span class="badge badge-success" x-show="configuredProvidersCount" x-text="configuredProvidersCount + ' provider' + (configuredProvidersCount !== 1 ? 's' : '')"></span>
            <span class="badge badge-dim" x-text="availableModelsCount + ' models'"></span>
            <span class="badge badge-warn" x-show="dirtyConfigCount" x-text="dirtyConfigCount + ' unsaved'"></span>
          </div>
          <div class="flex gap-2">
            <span class="text-xs text-dim" style="align-self:center" x-text="'v' + (sysInfo.version || '?') + ' \u00B7 up ' + formatUptime(sysInfo.uptime_seconds)"></span>
            <button class="btn btn-ghost btn-sm" @click="loadData()">Refresh</button>
          </div>
        </div>
        <div class="page-body" x-init="loadSettings()">
          <div x-show="loading && !providers.length" class="text-center text-dim" style="padding:48px 0">Loading settings...</div>
          <div x-show="!loading && loadError" class="error-state">
            <span class="error-icon">!</span>
            <p x-text="loadError"></p>
            <button class="btn btn-ghost btn-sm" @click="loadData()">Retry</button>
          </div>
          <div x-show="!loading && !loadError">
          <div x-show="loadWarnings.length" class="card mb-4" style="border-left:3px solid var(--warning)">
            <div class="text-xs text-dim">Some settings endpoints failed. Sections below may be incomplete.</div>
            <template x-for="warning in loadWarnings" :key="warning">
              <div class="text-xs text-dim" x-text="warning" style="margin-top:4px"></div>
            </template>
          </div>
          <div class="tabs" role="tablist">
            <div class="tab" role="tab" :class="{ active: tab === 'models-keys' }" @click="tab = 'models-keys'">Models &amp; Keys</div>
            <div class="tab" role="tab" :class="{ active: tab === 'config' }" @click="tab = 'config'; if (!configSchema) loadConfigSchema()">Configuration</div>
            <div class="tab" role="tab" :class="{ active: tab === 'budget' }" @click="tab = 'budget'">Budget</div>
            <div class="tab" role="tab" :class="{ active: tab === 'advanced' }" @click="tab = 'advanced'; if (!securityData && !secLoading) loadSecurity();">Advanced</div>
          </div>

          <!-- Models & Keys tab -->
          <div x-show="tab === 'models-keys'">
            <div class="card-grid" style="margin-top:16px">
              <template x-for="p in providers" :key="p.id">
                <div class="card provider-card" :class="providerCardClass(p)">
                  <div class="flex justify-between items-center mb-2">
                    <div class="card-header" style="margin:0" x-text="p.display_name"></div>
                    <span class="badge" :class="providerAuthClass(p)" x-text="providerAuthText(p)"></span>
                  </div>
                  <div class="card-meta" x-text="(p.model_count || 0) + ' model(s) available'"></div>
                  <div class="text-xs text-dim mt-2" x-show="p.api_key_env" x-text="'Env: ' + p.api_key_env"></div>
                  <!-- Key input for unconfigured providers -->
                  <template x-if="p.auth_status !== 'configured' && p.api_key_env">
                    <div class="key-input-group">
                      <input type="password" :placeholder="'Enter ' + p.api_key_env" x-model="providerKeyInputs[p.id]">
                      <button class="btn btn-primary btn-sm" @click="saveProviderKey(p)">Save</button>
                    </div>
                  </template>
                  <template x-if="p.auth_status !== 'configured' && p.api_key_env">
                    <div class="text-xs text-dim mt-2">Or set <code style="color:var(--accent-light);background:var(--bg);padding:1px 4px;border-radius:2px" x-text="p.api_key_env"></code> in your environment and restart</div>
                  </template>
                  <!-- Actions for configured providers -->
                  <template x-if="p.auth_status === 'configured'">
                    <div class="flex gap-2 mt-2">
                      <button class="btn btn-ghost btn-sm" @click="testProvider(p)" :disabled="providerTesting[p.id]">
                        <span x-show="!providerTesting[p.id]">Test</span>
                        <span x-show="providerTesting[p.id]" class="spinner" style="width:10px;height:10px;border-width:2px"></span>
                      </button>
                      <button class="btn btn-ghost btn-sm" style="color:var(--error)" @click="removeProviderKey(p)">Remove Key</button>
                    </div>
                  </template>
                  <!-- No key needed -->
                  <template x-if="!p.api_key_env || p.key_required === false">
                    <div class="text-xs mt-2" style="color:var(--success)" x-show="p.auth_status !== 'configured' && p.auth_status !== 'not_set' && p.auth_status !== 'missing'">No API key needed &mdash; runs locally or is free</div>
                  </template>
                </div>
              </template>
            </div>
            <div class="empty-state" x-show="!providers.length">
              <h4>No providers found</h4>
              <p class="hint">Provider information could not be loaded. Check that the API is running.</p>
            </div>

            <!-- Divider -->
            <div style="border-top:1px solid var(--border);margin:24px 0"></div>

            <!-- Model Catalog -->
            <h4 style="margin-bottom:8px">Model Catalog <span class="badge badge-muted" x-text="models.length + ' models'" style="margin-left:6px;font-weight:normal"></span></h4>
            <div class="flex gap-2 mb-4" style="flex-wrap:wrap">
              <div class="search-input" style="flex:1;min-width:200px">
                <span style="color:var(--text-muted)"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
                <input placeholder="Search models..." x-model="modelSearch">
              </div>
              <select class="form-select" style="width:160px" x-model="modelProviderFilter">
                <option value="">All Providers</option>
                <template x-for="pn in uniqueProviderNames" :key="pn">
                  <option :value="pn" x-text="pn"></option>
                </template>
              </select>
              <select class="form-select" style="width:140px" x-model="modelTierFilter">
                <option value="">All Tiers</option>
                <template x-for="t in uniqueTiers" :key="t">
                  <option :value="t" x-text="t"></option>
                </template>
              </select>
            </div>
            <div class="text-xs text-dim mb-2" x-text="filteredModels.length + ' of ' + models.length + ' models'"></div>
            <div class="table-wrap" x-show="filteredModels.length">
              <table>
                <thead><tr><th>Model</th><th>Provider</th><th>Tier</th><th>Context</th><th>Input Cost</th><th>Output Cost</th><th>Status</th></tr></thead>
                <tbody>
                  <template x-for="m in filteredModels" :key="m.id">
                    <tr>
                      <td class="font-bold" style="font-size:11px" x-text="m.display_name || m.id"></td>
                      <td class="text-dim" x-text="m.provider"></td>
                      <td><span class="tier-badge" :class="tierBadgeClass(m.tier)" x-text="m.tier || '-'"></span></td>

              normalizeError(err) { return err && err.message ? err.message : String(err || 'Unknown error'); },

                RustyHandAPI.get('/api/budget/agents')
              ]);
              if (results[0].status === 'fulfilled') {
                this.budgetData = results[0].value;
              } else {
                this.budgetData = null;
                this.budgetError = '/api/budget: ' + this.normalizeError(results[0].reason);
              }
              if (results[1].status === 'fulfilled') {
                this.agentRanking = results[1].value.agents || [];
              } else {
                this.agentRanking = [];
                this.budgetWarnings.push('/api/budget/agents: ' + this.normalizeError(results[1].reason));
              }
              this.budgetLoading = false;
            },
            startEdit() {
              this.editHourly = this.budgetData.hourly_limit || 0;
              this.editDaily = this.budgetData.daily_limit || 0;
              this.editMonthly = this.budgetData.monthly_limit || 0;
              this.editAlert = ((this.budgetData.alert_threshold || 0.8) * 100).toFixed(0);
              this.editMode = true;
            },
            async saveBudget() {
              this.saving = true;
              try {
                let body = {};
                if (+this.editHourly !== this.budgetData.hourly_limit) body.max_hourly_usd = +this.editHourly;
                if (+this.editDaily !== this.budgetData.daily_limit) body.max_daily_usd = +this.editDaily;
                if (+this.editMonthly !== this.budgetData.monthly_limit) body.max_monthly_usd = +this.editMonthly;
                let alertVal = (+this.editAlert) / 100;
                if (Math.abs(alertVal - this.budgetData.alert_threshold) > 0.001) body.alert_threshold = alertVal;
                await RustyHandAPI.put('/api/budget', body);
                this.editMode = false;
                await this.loadBudget();
                RustyHandToast.success('Budget limits updated');
              } catch(e) { RustyHandToast.error('Failed to save budget: ' + this.normalizeError(e)); }
              this.saving = false;
            },
            pctColor(pct) { return pct >= 0.8 ? '#ef4444' : pct >= 0.5 ? '#eab308' : '#22c55e'; },
            fmtUsd(v) { return v > 0 ? '$' + v.toFixed(4) : 'unlimited'; }
          }" x-init="loadBudget()">
            <div class="info-card" style="display:flex;justify-content:space-between;align-items:start">
              <div>
                <h4>Budget & Spending Limits</h4>
                <p>Monitor and control spending across all agents.</p>
              </div>
              <button class="btn btn-sm" @click="editMode ? saveBudget() : startEdit()" :disabled="saving" x-text="editMode ? (saving ? 'Saving...' : 'Save') : 'Edit Limits'" style="white-space:nowrap"></button>
            </div>
            <div x-show="budgetLoading"><div class="skeleton-stats-row"><div></div><div></div><div></div><div></div></div><div class="skeleton-table-rows"><div class="skeleton-table-header"><div class="skeleton-line-sm" style="width:25%;margin:0"></div><div class="skeleton-line-sm" style="width:15%;margin:0"></div><div class="skeleton-line-sm" style="width:20%;margin:0"></div></div><div class="skeleton-table-row"><div class="skeleton-line" style="width:22%;margin:0"></div><div class="skeleton-line" style="width:12%;margin:0"></div><div class="skeleton-badge"></div></div><div class="skeleton-table-row"><div class="skeleton-line" style="width:20%;margin:0"></div><div class="skeleton-line" style="width:14%;margin:0"></div><div class="skeleton-badge"></div></div></div></div>
            <div x-show="!budgetLoading && budgetError" class="error-state">
              <span class="error-icon">!</span>
              <p x-text="budgetError"></p>
              <button class="btn btn-ghost btn-sm" @click="loadBudget()">Retry</button>
            </div>
            <div x-show="!budgetLoading && !budgetError && budgetWarnings.length" class="card mb-4" style="border-left:3px solid var(--warning)">
              <div class="text-xs text-dim">Some budget details could not be loaded.</div>
              <template x-for="warning in budgetWarnings" :key="warning">
                <div class="text-xs text-dim" style="margin-top:6px" x-text="warning"></div>
              </template>
            </div>
            <div x-show="!budgetLoading && !budgetError && budgetData">
              <!-- Global budget meters -->
              <div class="stats-row" style="margin-bottom:16px">
                <div class="stat-card" style="flex:1">
                  <div class="stat-label">Hourly</div>
                  <div class="stat-value" style="font-size:18px" x-text="'$' + (budgetData.hourly_spend || 0).toFixed(4)"></div>
                  <div class="text-xs text-dim" x-text="'of ' + fmtUsd(budgetData.hourly_limit)"></div>
                  <div style="height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden" x-show="budgetData.hourly_limit > 0">
                    <div style="height:100%;border-radius:2px;transition:width 0.3s" :style="{width: Math.min(budgetData.hourly_pct*100,100)+'%', background: pctColor(budgetData.hourly_pct)}"></div>
                  </div>
                </div>
                <div class="stat-card" style="flex:1">
                  <div class="stat-label">Daily</div>
                  <div class="stat-value" style="font-size:18px" x-text="'$' + (budgetData.daily_spend || 0).toFixed(4)"></div>
                  <div class="text-xs text-dim" x-text="'of ' + fmtUsd(budgetData.daily_limit)"></div>
                  <div style="height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden" x-show="budgetData.daily_limit > 0">
                    <div style="height:100%;border-radius:2px;transition:width 0.3s" :style="{width: Math.min(budgetData.daily_pct*100,100)+'%', background: pctColor(budgetData.daily_pct)}"></div>
                  </div>
                </div>
                <div class="stat-card" style="flex:1">
                  <div class="stat-label">Monthly</div>
                  <div class="stat-value" style="font-size:18px" x-text="'$' + (budgetData.monthly_spend || 0).toFixed(4)"></div>
                  <div class="text-xs text-dim" x-text="'of ' + fmtUsd(budgetData.monthly_limit)"></div>
                  <div style="height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden" x-show="budgetData.monthly_limit > 0">
                    <div style="height:100%;border-radius:2px;transition:width 0.3s" :style="{width: Math.min(budgetData.monthly_pct*100,100)+'%', background: pctColor(budgetData.monthly_pct)}"></div>
                  </div>
                </div>
              </div>
              <div class="text-xs text-dim mb-3" x-show="budgetData.alert_threshold > 0 && !editMode">
                Alert threshold: <span x-text="(budgetData.alert_threshold * 100).toFixed(0) + '%'"></span> of any limit
              </div>

              <!-- Edit limits form -->
              <div x-show="editMode" class="card" style="margin:12px 0;padding:12px;border:1px solid var(--accent);border-radius:6px">
                <div class="stats-row" style="margin-bottom:8px;gap:8px">
                  <div style="flex:1">
                    <label class="text-xs text-dim">Hourly Limit ($)</label>
                    <input type="number" step="0.1" min="0" x-model="editHourly" class="input" style="width:100%;margin-top:2px" placeholder="0 = unlimited">
                  </div>
                  <div style="flex:1">
                    <label class="text-xs text-dim">Daily Limit ($)</label>
                    <input type="number" step="1" min="0" x-model="editDaily" class="input" style="width:100%;margin-top:2px" placeholder="0 = unlimited">
                  </div>
                  <div style="flex:1">
                    <label class="text-xs text-dim">Monthly Limit ($)</label>
                    <input type="number" step="1" min="0" x-model="editMonthly" class="input" style="width:100%;margin-top:2px" placeholder="0 = unlimited">
                  </div>
                  <div style="flex:0.6">
                    <label class="text-xs text-dim">Alert (%)</label>
                    <input type="number" step="5" min="0" max="100" x-model="editAlert" class="input" style="width:100%;margin-top:2px" placeholder="80">
                  </div>
                </div>
                <div class="text-xs text-dim">Set to 0 for unlimited. Changes apply immediately (in-memory, not persisted to config.toml).</div>
                <button class="btn btn-sm mt-2" @click="editMode = false" style="margin-right:8px">Cancel</button>
              </div>

              <!-- Per-agent cost ranking -->
              <h4 style="margin-top:16px;margin-bottom:8px">Top Spenders (Today)</h4>
              <div class="table-wrap" x-show="agentRanking.length">
                <table>
                  <thead><tr><th>Agent</th><th>Today</th><th>Hourly Limit</th><th>Daily Limit</th><th>Monthly Limit</th></tr></thead>
                  <tbody>
                    <template x-for="a in agentRanking" :key="a.agent_id">
                      <tr>
                        <td class="font-bold" x-text="a.name"></td>
                        <td x-text="'$' + (a.daily_cost_usd || 0).toFixed(4)"></td>
                        <td class="text-dim" x-text="fmtUsd(a.hourly_limit)"></td>
                        <td class="text-dim" x-text="fmtUsd(a.daily_limit)"></td>
                        <td class="text-dim" x-text="fmtUsd(a.monthly_limit)"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
              <div class="text-xs text-dim" x-show="!agentRanking.length && !budgetWarnings.length">No spending recorded today.</div>
            </div>
          </div>

          </div><!-- end Advanced tab -->

          </div>
        </div>
      </div>
    </template>

  </main>

  <nav class="mobile-dock">
    <button class="mobile-dock-item" :class="{ active: page === 'agents' }" @click="navigate('agents')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
      <span>Chat</span>
    </button>
    <button class="mobile-dock-item" :class="{ active: page === 'approvals' }" @click="navigate('approvals')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
      <span>Review</span>
    </button>
    <button class="mobile-dock-item mobile-dock-item-primary" @click="openPalette()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
      <span>Find</span>
    </button>
    <button class="mobile-dock-item" :class="{ active: page === 'automation' }" @click="navigate('automation')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>
      <span>Schedule</span>
    </button>
    <button class="mobile-dock-item" :class="{ active: page === 'settings' }" @click="navigate('settings')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21v-7"></path><path d="M4 10V3"></path><path d="M12 21v-9"></path><path d="M12 8V3"></path><path d="M20 21v-5"></path><path d="M20 12V3"></path><path d="M1 14h6"></path><path d="M9 8h6"></path><path d="M17 16h6"></path></svg>
      <span>Settings</span>
    </button>
  </nav>
</div>

<!-- Keyboard Shortcuts Modal -->
<template x-if="showShortcutsModal">
  <div class="modal-overlay" @click.self="showShortcutsModal = false" style="z-index:9999">
    <div class="shortcuts-modal" @keydown.escape.window="showShortcutsModal = false">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 style="font-size:15px;font-weight:700;margin:0">Keyboard Shortcuts</h3>
        <button class="btn btn-ghost btn-sm" @click="showShortcutsModal = false" style="padding:4px 8px">&times;</button>
      </div>
      <template x-for="cat in shortcutCategories" :key="cat.name">
        <div class="shortcut-section">
          <div class="shortcut-category" x-text="cat.name"></div>
          <template x-for="s in cat.items" :key="s.desc">
            <div class="shortcut-row">
              <span x-text="s.desc"></span>
              <div style="display:flex;align-items:center;gap:2px">
                <template x-for="(k, i) in s.keys" :key="i">
                  <span style="display:inline-flex;align-items:center">
                    <kbd class="shortcut-kbd" x-text="k"></kbd>
                    <span class="shortcut-plus" x-show="i < s.keys.length - 1">+</span>
                  </span>
                </template>
              </div>
            </div>
          </template>
        </div>
      </template>
      <div class="shortcut-footer">Press <kbd class="shortcut-kbd">?</kbd> to toggle this dialog</div>
    </div>
  </div>
</template>

<!-- Command Palette -->
<template x-if="showPalette">
  <div class="modal-overlay" @click.self="closePalette()" style="z-index:10000;align-items:flex-start;padding-top:20vh">
    <div class="palette" @keydown.stop="paletteKeydown($event)">
      <div class="palette-input-row">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="palette-input" type="text" placeholder="Search pages, agents, actions... (> for history)" x-model="paletteQuery" @input="paletteIdx = 0; if (paletteQuery.startsWith('>')) _paletteHistorySearch(paletteQuery.slice(1).trim())" autofocus>
        <kbd class="shortcut-kbd" style="font-size:10px">Esc</kbd>
      </div>
      <div class="palette-results" x-show="paletteItems.length">
        <template x-for="(item, idx) in paletteItems" :key="item.label + item.type">
          <div class="palette-item" :class="{ active: paletteIdx === idx }" @click="executePaletteItem(item)" @mouseenter="paletteIdx = idx">
            <span class="palette-type-badge" x-text="item.type"></span>
            <div class="palette-item-copy">
              <div class="palette-item-topline">
                <span class="palette-label" x-text="item.label"></span>
                <span class="palette-hint" x-show="item.hint" x-text="item.hint"></span>
              </div>
              <span class="palette-sublabel" x-show="item.sublabel" x-text="item.sublabel"></span>
            </div>
          </div>
        </template>
      </div>
      <div class="palette-empty" x-show="!paletteItems.length && paletteQuery">No results found</div>
      <div class="palette-footer">
        <span><kbd class="shortcut-kbd" style="font-size:9px">&uarr;</kbd><kbd class="shortcut-kbd" style="font-size:9px">&darr;</kbd> navigate</span>
        <span><kbd class="shortcut-kbd" style="font-size:9px">Enter</kbd> select</span>
        <span><kbd class="shortcut-kbd" style="font-size:9px">Esc</kbd> close</span>
      </div>
    </div>
  </div>
</template>

<!-- Toast notification container -->
<div id="toast-container" class="toast-container" aria-live="polite"></div>
