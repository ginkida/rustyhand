<body x-cloak x-data="app" :data-theme="theme">

<!-- Login Screen (shown when auth is required but not authenticated) -->
<div x-show="authRequired && !authenticated" class="login-screen" x-transition>
  <div class="login-card">
    <div class="login-logo">
      <img src="/logo.svg" alt="Rusty Hand" width="48" height="48">
      <h2>Rusty Hand</h2>
    </div>
    <p class="login-hint">Enter your API key to continue</p>
    <form @submit.prevent="login()">
      <input type="password" class="login-input" x-model="loginToken" placeholder="API key" autofocus :disabled="loginLoading">
      <button class="login-btn" type="submit" :disabled="loginLoading || !loginToken.trim()">
        <span x-show="!loginLoading">Sign In</span>
        <span x-show="loginLoading">Checking...</span>
      </button>
    </form>
    <div class="login-error" x-show="loginError" x-text="loginError"></div>
  </div>
</div>

<div class="app-layout" x-show="!authRequired || authenticated">
  <!-- Sidebar -->
  <nav class="sidebar" :class="{ collapsed: sidebarCollapsed, 'mobile-open': mobileMenuOpen }">
    <div class="sidebar-header">
      <div class="sidebar-header-text">
        <div class="sidebar-logo">
          <img src="/logo.svg" alt="Rusty Hand" width="28" height="28">
          <div>
            <h1>RUSTY HAND</h1>
            <div class="version" x-text="'v' + version"></div>
          </div>
        </div>
      </div>
      <div class="theme-switcher">
        <button class="theme-opt" :class="{ active: themeMode === 'light' }" @click="setTheme('light')" title="Light" aria-label="Light theme"><svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
        <button class="theme-opt" :class="{ active: themeMode === 'system' }" @click="setTheme('system')" title="System" aria-label="System theme"><svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></button>
        <button class="theme-opt" :class="{ active: themeMode === 'dark' }" @click="setTheme('dark')" title="Dark" aria-label="Dark theme"><svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
      </div>
    </div>

    <div class="sidebar-status" :class="{ offline: !connected && !$store.app.booting }">
      <span class="status-dot"></span>
      <span class="sidebar-label" x-show="connected" x-text="agentCount + ' agent(s) running'"></span>
      <span class="sidebar-label" x-show="$store.app.booting && !connected" class="conn-reconnecting">Connecting...</span>
      <span class="sidebar-label" x-show="!connected && !$store.app.booting && $store.app.connectionState === 'reconnecting'" class="conn-reconnecting">Reconnecting...</span>
      <span class="sidebar-label" x-show="!connected && !$store.app.booting && $store.app.connectionState !== 'reconnecting'" x-text="'disconnected' + ($store.app.lastError ? ' — ' + $store.app.lastError : '')">disconnected</span>
      <span class="conn-badge sidebar-label" :class="wsConnected ? 'ws' : 'http'" x-text="wsConnected ? 'WS' : 'HTTP'" x-show="connected"></span>
      <span class="sidebar-label" x-show="connected && $store.app.lastPingMs > 0" x-text="$store.app.lastPingMs + 'ms'" style="font-size:9px;opacity:0.5" :title="'API latency: ' + $store.app.lastPingMs + 'ms'"></span>
    </div>

    <div class="sidebar-nav" role="navigation" aria-label="Main navigation">
      <!-- Agent bar: New + filter -->
      <div class="sidebar-agent-bar">
        <button class="btn btn-primary btn-sm" @click="sidebarNewAgent()" style="padding:4px 10px" title="Create new agent">+ New</button>
        <div style="display:flex;gap:2px;margin-left:auto">
          <button class="agent-filter-btn" :class="{ active: $store.app.filterState === 'all' }" @click="$store.app.filterState = 'all'" x-text="'All (' + $store.app.agents.length + ')'"></button>
          <button class="agent-filter-btn" :class="{ active: $store.app.filterState === 'running' }" @click="$store.app.filterState = 'running'" x-text="'Live (' + $store.app.runningCount + ')'"></button>
        </div>
      </div>

      <div class="sidebar-search sidebar-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
        <input
          x-ref="sidebarAgentSearch"
          class="sidebar-search-input"
          type="text"
          x-model="$store.app.agentQuery"
          @input="$store.app.onAgentQueryChange()"
          placeholder="Find agent, group, model, or recent context">
        <button class="sidebar-search-clear" x-show="$store.app.agentQuery" @click="$store.app.agentQuery = ''" aria-label="Clear agent search">&times;</button>
      </div>

      <div class="sidebar-search-meta sidebar-label" x-show="$store.app.agentQuery">
        <span x-text="$store.app.filteredAgents.length + ' match(es)'"></span>
        <button class="btn btn-ghost btn-sm" style="padding:2px 8px;font-size:10px" @click="$store.app.agentQuery = ''">Clear</button>
      </div>

      <!-- Agent list (scrollable) -->
      <div class="sidebar-agent-list">
        <template x-if="!$store.app.agents.length">
          <div class="text-center text-dim sidebar-label" style="padding:24px 8px;font-size:12px">No agents yet</div>
        </template>
        <template x-if="$store.app.agents.length && !$store.app.filteredAgents.length">
          <div class="sidebar-empty-state sidebar-label">
            <div class="sidebar-empty-state-title">No matches</div>
            <div class="sidebar-empty-state-copy">Try a different name, model, or clear the search filter.</div>
          </div>
        </template>
        <template x-if="sidebarCollapsed">
          <div>
            <template x-for="agent in $store.app.filteredAgents" :key="agent.id">
              <div class="agent-list-item" :class="{ active: $store.app.activeChatAgent && $store.app.activeChatAgent.id === agent.id }" @click="sidebarChatWithAgent(agent)">
                <div class="agent-list-avatar" :style="'background:hsl('+$store.app.agentHue(agent.name)+',45%,55%);color:#fff;border-color:transparent'">
                  <span x-show="agent.identity && agent.identity.emoji" x-text="agent.identity && agent.identity.emoji"></span>
                  <span x-show="!agent.identity || !agent.identity.emoji" x-text="(agent.name||'A').charAt(0).toUpperCase()" style="font-size:15px;font-weight:700"></span>
                </div>
                <div class="agent-list-info sidebar-label">
                  <div class="agent-list-name" x-text="agent.name"></div>
                  <div class="agent-list-preview" x-text="agent.last_message_preview || agent.model_name" x-show="agent.last_message_preview || agent.model_name"></div>
                </div>
                <div class="agent-list-meta sidebar-label">
                  <span class="agent-list-time" x-text="timeAgo(agent.last_activity || agent.created_at)"></span>
                  <span class="agent-list-status" :class="agent.state === 'Running' ? 'running' : 'stopped'"></span>
                </div>
              </div>
            </template>
          </div>
        </template>
        <template x-if="!sidebarCollapsed">
          <div>
            <template x-for="group in $store.app.groupedAgents" :key="group.key">
              <div class="agent-sidebar-group">
                <button class="agent-sidebar-group-header" @click="$store.app.toggleAgentGroup(group.key)">
                  <div class="agent-sidebar-group-copy">
                    <span class="agent-sidebar-group-name" x-text="group.label"></span>
                    <span class="agent-sidebar-group-meta" x-text="group.agent_count + ' agent' + (group.agent_count !== 1 ? 's' : '') + ' · ' + group.running_count + ' live'"></span>
                  </div>
                  <span class="agent-sidebar-group-chevron" :class="{ collapsed: $store.app.isAgentGroupCollapsed(group.key) }">&#9654;</span>
                </button>
                <div class="agent-sidebar-group-list" x-show="!$store.app.isAgentGroupCollapsed(group.key)" x-transition>
                  <template x-for="agent in group.agents" :key="agent.id">
                    <div class="agent-list-item" :class="{ active: $store.app.activeChatAgent && $store.app.activeChatAgent.id === agent.id }" @click="sidebarChatWithAgent(agent)">
                      <div class="agent-list-avatar" :style="'background:hsl('+$store.app.agentHue(agent.name)+',45%,55%);color:#fff;border-color:transparent'">
                        <span x-show="agent.identity && agent.identity.emoji" x-text="agent.identity && agent.identity.emoji"></span>
                        <span x-show="!agent.identity || !agent.identity.emoji" x-text="(agent.name||'A').charAt(0).toUpperCase()" style="font-size:15px;font-weight:700"></span>
                      </div>
                      <div class="agent-list-info sidebar-label">
                        <div class="agent-list-name" x-text="agent.name"></div>
                        <div class="agent-list-preview" x-text="agent.last_message_preview || agent.model_name" x-show="agent.last_message_preview || agent.model_name"></div>
                      </div>
                      <div class="agent-list-meta sidebar-label">
                        <span class="agent-list-time" x-text="timeAgo(agent.last_activity || agent.created_at)"></span>
                        <span class="agent-list-status" :class="agent.state === 'Running' ? 'running' : 'stopped'"></span>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </template>
      </div>

      <!-- Templates collapsible -->
      <div class="agent-templates-section sidebar-label">
        <div class="agent-templates-toggle" @click="$store.app.templatesExpanded = !$store.app.templatesExpanded">
          <span>Templates</span>
          <span x-text="$store.app.templatesExpanded ? '\u25B2' : '\u25BC'" style="font-size:9px"></span>
        </div>
        <div class="agent-templates-list" x-show="$store.app.templatesExpanded" x-transition>
          <template x-for="t in $store.app.builtinTemplates.slice(0, 6)" :key="t.name">
            <div class="agent-template-item" @click="sidebarSpawnBuiltin(t)">
              <span class="badge badge-dim" x-text="t.category" style="flex-shrink:0"></span>
              <span x-text="t.name" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
            </div>
          </template>
        </div>
      </div>

      <!-- Navigation icon bar -->
      <div class="sidebar-nav-icons">
        <button class="sidebar-nav-icon-btn" :class="{ active: page === 'agents' }" @click="navigate('agents')" title="Chat" aria-label="Chat" data-tip="Chat">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button class="sidebar-nav-icon-btn" :class="{ active: page === 'approvals' }" @click="navigate('approvals')" title="Approvals" aria-label="Approvals" data-tip="Approvals" style="position:relative">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          <span class="sidebar-nav-badge" x-show="$store.app.pendingApprovals > 0" x-text="$store.app.pendingApprovals" aria-label="Pending approvals count"></span>
        </button>
        <button class="sidebar-nav-icon-btn" :class="{ active: page === 'automation' }" @click="navigate('automation')" title="Automation" aria-label="Automation" data-tip="Automation">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        </button>
        <button class="sidebar-nav-icon-btn" :class="{ active: page === 'analytics' }" @click="navigate('analytics')" title="Analytics" aria-label="Analytics" data-tip="Analytics">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        </button>
        <button class="sidebar-nav-icon-btn" :class="{ active: page === 'settings' }" @click="navigate('settings')" title="Settings" aria-label="Settings" data-tip="Settings">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3"/><path d="M1 14h6M9 8h6M17 16h6"/></svg>
        </button>
        <div style="position:relative" x-data="{ moreOpen: false }">
          <button class="sidebar-nav-icon-btn" :class="{ active: ['workflows','channels','skills','knowledge'].indexOf(page) >= 0 }" @click="moreOpen = !moreOpen" title="More" aria-label="More pages" aria-haspopup="true" :aria-expanded="moreOpen" data-tip="More">
            <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
          </button>
          <div class="sidebar-more-menu" role="menu" x-show="moreOpen" @click.outside="moreOpen = false" x-transition>
            <a class="sidebar-more-item" role="menuitem" :class="{ active: page === 'workflows' }" @click="navigate('workflows'); moreOpen = false">Workflows</a>
            <a class="sidebar-more-item" role="menuitem" :class="{ active: page === 'channels' }" @click="navigate('channels'); moreOpen = false">Channels</a>
            <a class="sidebar-more-item" role="menuitem" :class="{ active: page === 'skills' }" @click="navigate('skills'); moreOpen = false">Skills</a>
            <a class="sidebar-more-item" role="menuitem" :class="{ active: page === 'knowledge' }" @click="navigate('knowledge'); moreOpen = false">Knowledge Graph</a>
          </div>
        </div>
      </div>
    </div>
    <div class="sidebar-toggle" role="button" tabindex="0" @click="toggleSidebar()" @keydown.enter="toggleSidebar()" x-text="sidebarCollapsed ? '\u276F' : '\u276E'" :aria-label="sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'"></div>
  </nav>

  <div class="sidebar-overlay" @click="mobileMenuOpen = false"></div>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Mobile menu button -->
    <button class="mobile-menu-btn btn btn-ghost" @click="mobileMenuOpen = !mobileMenuOpen" style="position:fixed;top:8px;left:8px;z-index:98;padding:6px 10px" title="Open menu" aria-label="Open menu">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>

    <nav class="workspace-bar">
      <div class="workspace-bar-left">
        <span class="workspace-bar-crumb workspace-bar-current" x-text="currentPageMeta.title"></span>
        <template x-if="page === 'agents' && $store.app.activeChatAgent">
          <span>
            <span class="workspace-bar-sep">/</span>
            <span class="workspace-bar-crumb" x-text="$store.app.activeChatAgent.name"></span>
          </span>
        </template>
      </div>
      <div class="workspace-bar-right">
        <button class="workspace-bar-btn" @click="openPalette()" title="Command Menu (Ctrl+K)" aria-label="Command menu">
          <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <kbd style="font-size:9px;opacity:0.5;margin-left:2px">&#8984;K</kbd>
        </button>
        <button class="workspace-bar-btn" @click="refreshWorkspace()" title="Refresh workspace" aria-label="Refresh workspace">
          <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        </button>
        <button class="workspace-bar-btn" @click="sidebarNewAgent()" title="New Agent (Ctrl+N)" aria-label="New agent">
          <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
          <kbd style="font-size:9px;opacity:0.5;margin-left:2px">&#8984;N</kbd>
        </button>
        <button class="workspace-bar-btn" x-show="page === 'agents' && !$store.app.activeChatAgent" @click="exportAgents()" title="Export all agents (JSON)" aria-label="Export agents">
          <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="workspace-bar-btn" x-show="page === 'agents' && !$store.app.activeChatAgent" @click="$refs.agentImportInput.click()" title="Import agents from JSON" aria-label="Import agents">
          <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <input type="file" x-ref="agentImportInput" accept="application/json" style="display:none" @change="importAgents($event.target.files[0])">
        </button>
        <button class="workspace-bar-btn" x-show="authRequired" @click="doLogout()" title="Logout" style="color:var(--text-dim)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </nav>

    <!-- Page: Agents -->
    <template x-if="page === 'agents'">
      <div x-data="agentsPage" @close-chat.window="closeChat()">

              <div x-data="chatPage" class="chat-wrapper" x-show="$store.app.activeChatAgent">
                <!-- Chat header -->
                <div class="page-header" x-show="currentAgent">
                  <div class="flex items-center gap-2" style="min-width:0">
                <button class="btn btn-ghost btn-sm" @click="$dispatch('close-chat')" title="Back to agents" style="padding:4px 6px;flex-shrink:0">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <span x-show="currentAgent && currentAgent.identity && currentAgent.identity.emoji" x-text="currentAgent && currentAgent.identity && currentAgent.identity.emoji" style="font-size:20px;line-height:1"></span>
                <div style="min-width:0">
                  <div class="font-bold" style="font-size:14px" x-text="currentAgent ? currentAgent.name : ''"></div>
                  <div class="chat-agent-meta-row" x-show="currentAgent && !groupEditOpen">
                    <span class="chat-group-pill" x-text="currentAgent && currentAgent.group ? currentAgent.group : 'Ungrouped'"></span>
                    <button class="chat-meta-link" @click="openGroupEditor()">Change group</button>
                  </div>
                  <div style="position:relative;display:inline-block">
                    <button class="model-switch-btn" @click="openModelSwitch()" title="Click to change model">
                      <span x-text="currentAgent ? currentAgent.model_name : ''"></span>
                      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <!-- Model Switcher Dropdown -->
                    <div class="model-switch-dropdown" x-show="modelSwitchOpen" @click.outside="modelSwitchOpen = false" x-transition>
                      <div style="padding:10px 12px 8px;border-bottom:1px solid var(--border)">
                        <div style="font-size:11px;font-weight:700;margin-bottom:6px;color:var(--text-dim)">PROVIDER</div>
                        <div style="display:flex;flex-wrap:wrap;gap:4px">
                          <template x-for="p in modelSwitchProviders" :key="p.id">
                            <button class="provider-pill" style="padding:3px 8px;font-size:11px" :class="{ active: modelSwitchProvider === p.id }" @click="modelSwitchProvider = p.id" x-text="p.display_name || p.id"></button>
                          </template>
                        </div>
                      </div>
                      <div style="max-height:260px;overflow-y:auto">
                        <template x-for="m in modelSwitchFiltered" :key="m.id">
                          <button class="model-switch-item" :class="{ active: currentAgent && currentAgent.model_name === m.id }" @click="switchModel(m.id)" :disabled="modelSwitchSaving">
                            <span class="model-tier-dot" :style="'background:' + modelTierColor(m.tier)"></span>
                            <div style="flex:1;min-width:0">
                              <div style="font-size:12px;font-weight:600" x-text="m.display_name || m.id"></div>
                              <div style="font-size:10px;color:var(--text-dim)" x-text="(m.context_window >= 1000000 ? (m.context_window/1000000).toFixed(1) + 'M' : Math.round(m.context_window/1000) + 'K') + ' ctx' + (m.input_cost_per_m > 0 ? '  \u2022  $' + m.input_cost_per_m.toFixed(2) + '/$' + m.output_cost_per_m.toFixed(2) : '  \u2022  Free')"></div>
                            </div>
                            <span x-show="currentAgent && currentAgent.model_name === m.id" style="color:var(--accent);font-size:12px;font-weight:700">&#10003;</span>
                          </button>
                        </template>
                        <div x-show="modelSwitchFiltered.length === 0" class="text-xs text-dim" style="padding:12px;text-align:center">No models available</div>
                      </div>
                    </div>
                  </div>
                  <div class="chat-group-editor" x-show="groupEditOpen" x-transition>
                    <input class="form-input" x-ref="groupInput" x-model="groupDraft" placeholder="Ops / Research / Clients" @keydown.enter.prevent="saveGroup()" style="min-width:220px">
                    <button class="btn btn-primary btn-sm" @click="saveGroup()" :disabled="groupSaving">
                      <span x-show="!groupSaving">Save</span>
                      <span x-show="groupSaving">Saving...</span>
                    </button>
                    <button class="btn btn-ghost btn-sm" @click="cancelGroupEditor()">Cancel</button>
                  </div>
                </div>
              </div>
              <div class="flex gap-2 items-center">
                <span class="badge badge-running" x-show="currentAgent && !sending"
                      x-transition:enter="transition ease-out duration-200"
                      x-transition:enter-start="opacity-0"
                      x-transition:enter-end="opacity-100"
                      x-transition:leave="transition ease-in duration-150"
                      x-transition:leave-start="opacity-100"
                      x-transition:leave-end="opacity-0"
                      :title="contextPressure !== 'low' ? 'Context: ' + contextPressure : 'Ready'">
                  <span :style="'display:inline-block;width:6px;height:6px;border-radius:50%;background:'+contextDotColor+';margin-right:2px;transition:background 0.4s'"></span>
                  <span x-text="contextPressure !== 'low' ? 'Context: ' + contextPressure : 'Ready'"></span>
                </span>
                <span class="badge badge-suspended" x-show="sending"
                      x-transition:enter="transition ease-out duration-200"
                      x-transition:enter-start="opacity-0"
                      x-transition:enter-end="opacity-100"
                      x-transition:leave="transition ease-in duration-150"
                      x-transition:leave-start="opacity-100"
                      x-transition:leave-end="opacity-0">
                  <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:0.7;animation:pulse 1.2s ease-in-out infinite"></span>
                  <span x-text="tokenCount > 0 ? '~' + tokenCount + ' tokens' + (tokensPerSec > 0 ? ' · ' + tokensPerSec + ' t/s' : '') : 'Generating...'"></span>
                </span>
                <span class="queue-badge" x-show="messageQueue.length > 0" x-text="'+' + messageQueue.length + ' queued'" x-transition.opacity.duration.200ms></span>
                <!-- Session cost accumulator (shown when any cost has been incurred) -->
                <span class="session-cost-badge" x-show="sessionCostUsd > 0" x-text="'$' + sessionCostUsd.toFixed(4)" :title="'Session cost: $' + sessionCostUsd.toFixed(6)" x-transition.opacity.duration.300ms></span>
                <!-- Session switcher -->
                <div style="position:relative">
                  <button class="btn btn-ghost btn-sm" @click="sessionsOpen = !sessionsOpen" title="Sessions" style="position:relative">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
                    <span class="session-count-badge" x-show="sessions.length > 1" x-text="sessions.length"></span>
                  </button>
                  <div class="session-dropdown" x-show="sessionsOpen" @click.outside="sessionsOpen = false" x-transition>
                    <div class="session-dropdown-header">
                      <span class="text-xs font-bold">Sessions</span>
                      <button class="btn btn-ghost btn-sm" @click="createSession()" style="padding:2px 6px;font-size:11px">+ New</button>
                    </div>
                    <template x-for="s in sessions" :key="s.session_id">
                      <div class="session-item" :class="{ active: s.active }" @click="if (!s.active) { switchSession(s.session_id); sessionsOpen = false; }">
                        <span class="session-dot" :class="s.active ? 'active' : ''"></span>
                        <div style="flex:1;min-width:0">
                          <div class="text-xs font-bold truncate" x-text="s.label || s.first_preview || 'Session ' + s.session_id.substring(0, 8)"></div>
                          <div class="text-xs text-dim" x-text="s.message_count + ' messages · ' + (s.created_at ? new Date(s.created_at).toLocaleDateString() : '')"></div>
                        </div>
                      </div>
                    </template>
                    <div class="text-xs" style="padding:8px 12px;color:var(--warning)" x-show="sessionsLoadError" x-text="sessionsLoadError"></div>
                    <div class="text-xs text-dim" style="padding:8px 12px;text-align:center" x-show="!sessions.length && !sessionsLoadError">No sessions</div>
                  </div>
                </div>
                <button class="btn btn-ghost btn-sm" @click="toggleSearch()" title="Search messages (Ctrl+F)">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                </button>
                <button class="btn btn-ghost btn-sm" @click="starredOpen = !starredOpen" :class="{ active: starredOpen }" title="Starred messages" style="position:relative">
                  <svg width="14" height="14" viewBox="0 0 24 24" :fill="starredMessages.length ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                  <span class="session-count-badge" x-show="starredMessages.length" x-text="starredMessages.length" x-transition.opacity.duration.200ms></span>
                </button>
                <button class="btn btn-ghost btn-sm" @click="logOpen = !logOpen" :class="{ active: logOpen }" title="Activity Log" style="position:relative">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                  <span class="session-count-badge" x-show="actionLog.length" x-text="actionLog.length" x-transition.opacity.duration.200ms></span>
                </button>
                <button class="btn btn-danger btn-sm" @click="killAgent()" title="Stop this agent">Stop</button>
              </div>
            </div>

            <!-- Search bar -->
            <div class="chat-search-bar" x-show="searchOpen" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 transform -translate-y-2" x-transition:enter-end="opacity-100 transform translate-y-0">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" id="chat-search-input" x-model="searchQuery" x-ref="searchInput" placeholder="Search messages..." class="chat-search-input" @keydown.escape="toggleSearch()">
              <span class="text-xs text-dim" x-show="searchQuery.trim()" x-text="filteredMessages.length + ' of ' + messages.length"></span>
              <button class="btn btn-ghost btn-sm" @click="toggleSearch()" style="padding:2px 6px">&times;</button>
            </div>

            <!-- Starred messages panel -->
            <div class="activity-log-panel" x-show="starredOpen"
                 x-transition:enter="transition ease-out duration-150"
                 x-transition:enter-start="opacity-0 transform -translate-y-2"
                 x-transition:enter-end="opacity-100 transform translate-y-0">
              <div class="activity-log-header">
                <span class="text-xs font-bold">Starred Messages</span>
                <span class="text-xs text-dim" x-text="starredMessages.length + ' starred'"></span>
                <button class="btn btn-ghost btn-sm" @click="clearStars()" x-show="starredMessages.length" style="margin-left:auto;padding:2px 6px">Clear all</button>
              </div>
              <div style="max-height:260px;overflow-y:auto">
                <template x-if="!starredMessages.length">
                  <div class="text-xs text-dim" style="padding:16px;text-align:center">No starred messages yet.<br>Click ★ on any message to star it.</div>
                </template>
                <template x-for="(msg, i) in starredMessages" :key="i">
                  <div style="padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer" @click="scrollToStarred(msg)">
                    <div style="font-size:10px;color:var(--text-dim);margin-bottom:4px" x-text="(msg.role === 'agent' ? 'Agent' : 'You') + ' · ' + formatTime(msg.ts)"></div>
                    <div style="font-size:12px;line-height:1.4;color:var(--text);overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical" x-text="(msg.text || '').replace(/[#*`>]/g,'').substring(0,200)"></div>
                    <button class="btn btn-ghost btn-sm" style="margin-top:4px;padding:1px 6px;font-size:10px" @click.stop="toggleStar(msg)">Unstar</button>
                  </div>
                </template>
              </div>
            </div>

            <!-- Activity Log panel -->
            <div class="activity-log-panel" x-show="logOpen"
                 x-transition:enter="transition ease-out duration-150"
                 x-transition:enter-start="opacity-0 transform -translate-y-2"
                 x-transition:enter-end="opacity-100 transform translate-y-0">
              <div class="activity-log-header">
                <span class="text-xs font-bold">Activity Log</span>
                <span class="text-xs text-dim" x-text="actionLog.length + ' action(s)'"></span>
                <button class="btn btn-ghost btn-sm" @click="actionLog = []"
                        x-show="actionLog.length" style="margin-left:auto;padding:2px 6px">Clear</button>
              </div>
              <div class="activity-log-list" style="max-height:240px;overflow-y:auto">
                <template x-for="(entry, i) in actionLog" :key="i">
                  <div class="activity-log-entry" :class="{ 'is-error': entry.is_error }"
                       @click="entry.expanded = !entry.expanded">
                    <div class="activity-log-row">
                      <span class="text-xs text-dim" x-text="formatLogTime(entry.ts)"></span>
                      <span class="tool-card-icon" x-html="toolIcon(entry.tool)"
                            style="width:20px;height:20px;padding:3px"></span>
                      <span class="tool-card-name" x-text="entry.tool"></span>
                      <template x-if="entry.running">
                        <div class="tool-card-spinner" style="width:12px;height:12px"></div>
                      </template>
                      <template x-if="!entry.running && !entry.is_error">
                        <span class="tool-icon-ok" style="font-size:10px"></span>
                      </template>
                      <template x-if="!entry.running && entry.is_error">
                        <span class="tool-icon-err" style="font-size:10px"></span>
                      </template>
                      <span class="text-xs text-dim truncate" style="flex:1;margin-left:4px"
                            x-text="entry.input ? entry.input.substring(0,80) : ''"></span>
                    </div>
                    <div x-show="entry.expanded" class="activity-log-detail">
                      <div x-show="entry.input">
                        <div class="tool-section-label">Input</div>
                        <pre class="tool-pre" x-text="formatToolJson(entry.input)"></pre>
                      </div>
                      <div x-show="entry.result">
                        <div class="tool-section-label">Result</div>
                        <pre class="tool-pre" :class="{ 'tool-pre-error': entry.is_error }"
                             x-text="formatToolJson(entry.result)"></pre>
                      </div>
                    </div>
                  </div>
                </template>
                <div class="text-xs text-dim" style="padding:12px;text-align:center"
                     x-show="!actionLog.length">No tool executions yet</div>
              </div>
            </div>

            <!-- Connection status banner (only after WS was connected at least once) -->
            <div x-show="$store.app.connectionState === 'reconnecting' && $store.app._wasConnected" class="chat-conn-banner warn">
              Reconnecting to agent...
            </div>
            <div x-show="$store.app.connectionState === 'disconnected' && currentAgent && $store.app._wasConnected" class="chat-conn-banner error">
              Connection lost &mdash; messages will be sent via HTTP
              <button class="btn btn-ghost btn-sm" @click="connectWs(currentAgent.id)">Retry</button>
            </div>

            <!-- Messages area -->
            <!-- Context pressure warning banner -->
            <div x-show="contextPressure === 'high' || contextPressure === 'critical'" x-transition
                 style="display:flex;align-items:center;gap:10px;padding:7px 16px;font-size:12px;border-bottom:1px solid var(--border)"
                 :style="contextPressure === 'critical' ? 'background:rgba(239,68,68,0.1);color:var(--error)' : 'background:rgba(245,158,11,0.1);color:var(--warning)'">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
              <span x-text="contextPressure === 'critical' ? 'Context is full — compact or start a new chat to continue.' : 'Context is getting full. Consider compacting.'"></span>
              <button class="btn btn-sm" style="padding:2px 8px;font-size:11px;margin-left:auto" @click="sendWsCommand('compact', '')">Compact</button>
              <button class="btn btn-sm" style="padding:2px 8px;font-size:11px" @click="sendWsCommand('new', '')">New chat</button>
            </div>
            <div class="messages" id="messages" :class="{ 'drag-over': isDragging }" @dragover.prevent="isDragging = true" @dragleave="isDragging = false" @drop.prevent="handleDrop($event); isDragging = false" @scroll="checkScroll()" style="position:relative">
              <!-- Message list -->
              <template x-if="currentAgent">
                <div>
                  <template x-for="(msg, $index) in filteredMessages" :key="msg.id">
                    <div class="message" :data-msg-id="msg.id" :class="msg.role + (msg.thinking ? ' thinking' : '') + (msg.streaming ? ' streaming' : '') + (isGrouped($index) ? ' grouped' : '')">
                      <div class="message-avatar" x-show="msg.role === 'agent'">
                        <img src="/logo.svg" alt="Rusty Hand">
                      </div>
                      <div class="message-body">
                        <!-- Copy button on hover -->
                        <div class="message-actions" x-show="msg.text && msg.text.trim() && !msg.thinking && !msg.streaming">
                          <!-- Copy button -->
                          <button class="message-action-btn" :class="{ copied: msg._copied }" @click="copyMessage(msg)" :title="msg._copied ? 'Copied!' : 'Copy message'" style="position:relative">
                            <svg x-show="!msg._copied" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                            <svg x-show="msg._copied" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
                            <span class="copied-tooltip" x-show="msg._copied" x-transition>Copied!</span>
                          </button>
                          <!-- Star / bookmark button -->
                          <button class="message-action-btn" :class="{ starred: msg._starred }" @click="toggleStar(msg)" :title="msg._starred ? 'Unstar message' : 'Star message'" style="position:relative">
                            <svg width="13" height="13" viewBox="0 0 24 24" :fill="msg._starred ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                          </button>
                          <!-- Regenerate button (last agent message only) -->
                          <button class="message-action-btn" x-show="msg.role === 'agent' && $index === filteredMessages.length - 1 && !sending" @click="sendWsCommand('retry', '')" title="Regenerate response" style="opacity:0.7">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
                          </button>
                          <!-- Delete button -->
                          <button class="message-action-btn" x-show="!msg._confirmDelete" @click="deleteMessage(msg)" title="Delete message">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                          </button>
                          <button class="message-delete-confirm" x-show="msg._confirmDelete" @click="deleteMessage(msg)">Delete?</button>
                        </div>
                        <!-- Thinking indicator -->
                        <div class="thinking-indicator" x-show="msg.thinking" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-100" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0">
                          <div class="thinking-pulse"></div>
                          <span class="thinking-label" x-text="msg.text || 'Processing...'"></span>
                        </div>
                        <!-- Reasoning panel — shown after extended thinking / DeepSeek R1 -->
                        <template x-if="msg._reasoning && !msg.thinking">
                          <details class="reasoning-panel" x-bind:open="msg._reasoningOpen" @toggle="msg._reasoningOpen = $event.target.open">
                            <summary class="reasoning-summary">
                              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
                              <span>Reasoning</span>
                              <span class="reasoning-tokens" x-text="'~' + Math.round((msg._reasoning || '').length / 4) + ' tokens'"></span>
                            </summary>
                            <div class="reasoning-content markdown-body" x-html="renderMarkdown(msg._reasoning || '')"></div>
                          </details>
                        </template>
                        <!-- Normal message content -->
                        <div class="message-bubble" :class="{ 'markdown-body': (msg.role === 'agent' || msg.role === 'system') && !msg.thinking }" x-show="msg.text && msg.text.trim() && !msg.thinking" x-html="highlightSearch(msg.isHtml ? sanitizeHtml(msg.text) : ((msg.role === 'agent' || msg.role === 'system') && !msg.thinking ? renderMarkdown(msg.text) : escapeHtml(msg.text)))"></div>
                        <!-- Inline images from uploads (shown above tool cards) -->
                        <template x-if="msg.images && msg.images.length">
                          <div style="display:flex;flex-wrap:wrap;gap:8px;margin:8px 0">
                            <template x-for="img in msg.images" :key="img.file_id">
                              <a :href="'/api/uploads/' + img.file_id" target="_blank" style="display:block">
                                <img :src="'/api/uploads/' + img.file_id" :alt="img.filename || 'uploaded image'" style="max-width:320px;max-height:320px;border-radius:8px;border:1px solid var(--border);cursor:pointer" loading="lazy">
                              </a>
                            </template>
                          </div>
                        </template>
                        <template x-for="tool in (msg.tools || [])" :key="tool.id">
                          <div class="tool-card" :class="{ 'tool-card-error': tool.is_error }" :data-tool="tool.name">
                            <div class="tool-card-header" @click="tool.expanded = !tool.expanded">
                              <template x-if="tool.running"><div class="tool-card-spinner"></div></template>
                              <template x-if="!tool.running && !tool.is_error"><span class="tool-icon-ok">&#10003;</span></template>
                              <template x-if="!tool.running && tool.is_error"><span class="tool-icon-err">&#10007;</span></template>
                              <span class="tool-card-icon" x-html="toolIcon(tool.name)"></span>
                              <span class="tool-card-name" x-text="tool.name"></span>
                              <span class="text-xs text-dim" x-text="tool.running ? 'running...' : (tool.is_error ? 'error' : (tool.result ? (tool.result.length > 500 ? Math.round(tool.result.length/1024) + 'KB' : 'done') : 'done'))" style="margin-left:auto"></span>
                              <span class="tool-expand-chevron" :style="tool.expanded ? 'transform:rotate(90deg)' : ''" style="transition:transform 0.15s">&#9654;</span>
                            </div>
                            <!-- Render generated images above the raw result -->
                            <div x-show="tool._imageUrls && tool._imageUrls.length" style="padding:8px 12px;display:flex;flex-wrap:wrap;gap:8px">
                              <template x-for="iurl in (tool._imageUrls || [])" :key="iurl">
                                <a :href="iurl" target="_blank" style="display:block">
                                  <img :src="iurl" alt="Generated image" style="max-width:320px;max-height:320px;border-radius:8px;border:1px solid var(--border);cursor:pointer" loading="lazy">
                                </a>
                              </template>
                            </div>
                            <!-- Audio player for TTS results -->
                            <div x-show="tool._audioFile" style="padding:8px 12px">
                              <div class="audio-player">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                                <span class="text-xs" x-text="'Audio: ' + (tool._audioFile || '').split('/').pop()"></span>
                                <span class="text-xs text-dim" x-show="tool._audioDuration" x-text="'~' + Math.round((tool._audioDuration || 0) / 1000) + 's'"></span>
                              </div>
                            </div>
                            <div class="tool-card-body" x-show="tool.expanded" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100">
                              <div x-show="tool.input" style="margin-bottom:6px">
                                <div class="tool-section-label">Input</div>
                                <pre class="tool-pre" x-text="formatToolJson(tool.input)"></pre>
                              </div>
                              <div x-show="tool.result">
                                <div class="tool-section-label">Result <span class="text-xs text-muted" x-show="tool.result && tool.result.length > 200" x-text="'(' + tool.result.length + ' chars)'"></span></div>
                                <pre class="tool-pre" :class="{ 'tool-pre-error': tool.is_error, 'tool-pre-short': !tool.is_error && tool.result && tool.result.length < 100, 'tool-pre-medium': !tool.is_error && tool.result && tool.result.length >= 100 && tool.result.length < 500 }" x-text="formatToolJson(tool.result)"></pre>
                              </div>
                            </div>
                          </div>
                        </template>
                        <!-- Timestamp + meta row -->
                        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                          <div class="message-time" x-text="formatTime(msg.ts)" x-show="msg.ts && !msg.thinking"></div>
                          <div class="message-meta" x-text="msg.meta" x-show="msg.meta"></div>
                        </div>
                        <!-- Message status for user messages -->
                        <div class="message-status" x-show="msg.role === 'user' && msg.status">
                          <span class="status-icon sending" x-show="msg.status === 'sending'">&#8987;</span>
                          <span class="status-icon sent" x-show="msg.status === 'sent'">&#10003;</span>
                          <span class="status-icon failed" x-show="msg.status === 'error'">&#10007;</span>
                        </div>
                        <!-- Retry button on errors -->
                        <button class="btn-retry" x-show="msg.retryable" @click="retry(msg)">&#8634; Retry</button>
                      </div>
                    </div>
                  </template>
                </div>
              </template>

              <!-- Scroll to bottom button -->
              <button class="scroll-to-bottom-btn" :class="{ visible: isScrolledUp }" @click="scrollToBottom()" title="Jump to latest">&#8595;</button>
            </div>

            <!-- Input area -->
            <div class="input-area" x-show="currentAgent" style="position:relative">
              <!-- Attachment previews -->
              <div x-show="attachments.length > 0" style="display:flex;gap:8px;flex-wrap:wrap;padding:0 0 8px 0">
                <template x-for="(att, aidx) in attachments" :key="aidx">
                  <div style="position:relative;border:1px solid var(--border);border-radius:6px;padding:4px;display:flex;align-items:center;gap:6px;background:var(--surface2);max-width:180px">
                    <img x-show="att.preview" :src="att.preview" style="width:32px;height:32px;object-fit:cover;border-radius:4px">
                    <span x-show="!att.preview" style="font-size:18px;width:32px;text-align:center">&#128196;</span>
                    <span class="text-xs truncate" style="max-width:100px" x-text="att.file.name"></span>
                    <span x-show="att.uploading" class="spinner" style="width:12px;height:12px;border-width:2px"></span>
                    <button @click="removeAttachment(aidx)" style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--danger);color:#fff;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;line-height:1">&times;</button>
                  </div>
                </template>
              </div>
              <!-- Slash command menu -->
              <div x-show="showSlashMenu && filteredSlashCommands.length" class="slash-menu">
                <template x-for="(cmd, idx) in filteredSlashCommands" :key="cmd.cmd">
                  <div class="slash-menu-item" :class="{ 'slash-active': idx === slashIdx }" @click="executeSlashCommand(cmd.cmd)" @mouseenter="slashIdx = idx">
                    <span class="font-bold" style="font-size:13px" x-text="cmd.cmd"></span>
                    <span class="slash-menu-args" x-show="cmd.args" x-text="cmd.args"></span>
                    <span class="text-xs text-dim" x-text="cmd.desc"></span>
                  </div>
                </template>
              </div>
              <!-- Input row -->
              <div class="input-row">
                <button class="btn btn-ghost btn-sm" @click="$refs.fileInput.click()" title="Attach file" style="padding:6px 8px;flex-shrink:0">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <input type="file" x-ref="fileInput" multiple accept="image/*,.txt,.pdf,.md,.json,.csv,.mp3,.wav,.ogg,.webm,.m4a,.flac" @change="addFiles($event.target.files); $event.target.value = ''" style="display:none">
                <!-- Mic button -->
                <button class="btn btn-ghost btn-sm" :class="{ 'btn-recording': recording }" @mousedown="startRecording()" @mouseup="stopRecording()" @mouseleave="if(recording) stopRecording()" title="Hold to record voice" style="padding:6px 8px;flex-shrink:0">
                  <svg x-show="!recording" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                  <span x-show="recording" class="recording-dot"></span>
                </button>
                <!-- Recording indicator -->
                <div class="recording-indicator" x-show="recording" x-transition>
                  <span class="recording-dot"></span>
                  <span class="text-xs" style="color:var(--danger)" x-text="formatRecordingTime()"></span>
                </div>
                <textarea id="msg-input" rows="1" :placeholder="recording ? 'Recording... release to send' : 'Message RustyHand... (/ for commands)'"
                          @keydown.enter.prevent="if(!$event.shiftKey){if(showSlashMenu && filteredSlashCommands.length){executeSlashCommand(filteredSlashCommands[slashIdx].cmd)}else{sendMessage()}}"
                          @keydown.escape="showSlashMenu = false"
                          @keydown.arrow-up.prevent="if(showSlashMenu){slashIdx = Math.max(0, slashIdx - 1)}else if(!inputText.trim()){recallLastMessage()}"
                          @keydown.arrow-down.prevent="if(showSlashMenu){slashIdx = Math.min(filteredSlashCommands.length - 1, slashIdx + 1)}"
                          @input="$el.style.height='auto';$el.style.height=Math.min($el.scrollHeight,150)+'px'"
                          @paste="handlePaste($event)"
                          x-model="inputText"
                          :class="{ 'streaming-active': sending }"></textarea>
                <!-- Send button (normal) or Stop button (during streaming) -->
                <template x-if="!sending">
                  <button class="btn-send" @click="sendMessage()" :disabled="!inputText.trim() && !attachments.length">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                  </button>
                </template>
                <template x-if="sending">
                  <button class="btn-stop" @click="stopAgent()" title="Stop generating">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                  </button>
                </template>
              </div>
              <!-- Footer: tokens + queue + tips -->
              <div class="input-footer">
                <div class="flex items-center gap-2">
                  <span class="text-xs text-dim" x-text="tokenCount > 0 ? '~' + tokenCount + ' tokens' : (attachments.length ? attachments.length + ' file(s)' : '')"></span>
                  <span class="queue-badge" x-show="messageQueue.length > 0" x-text="messageQueue.length + ' queued'"></span>
                  <span class="char-count" :class="{ warning: inputText.length > 2000, danger: inputText.length > 4000 }" x-show="inputText.length > 500" x-text="inputText.length + ' chars'"></span>
                </div>
                <div class="tip-bar" x-show="currentTip && !sending">
                  <span class="text-xs" x-text="currentTip"></span>
                  <button class="tip-bar-dismiss" @click="dismissTips()" title="Dismiss">&times;</button>
                </div>
              </div>
            </div>
          </div>

            <!-- Empty state: no agent selected -->
            <template x-if="!$store.app.activeChatAgent">
              <div class="page-body">
                <div x-show="loadError" class="error-state">
                  <span class="error-icon">!</span>
                  <p x-text="loadError"></p>
                  <button class="btn btn-ghost btn-sm" @click="loadData()">Retry</button>
                </div>
                <div x-show="!loadError" class="agent-home-shell">

                  <!-- ── Header: stats + CTA ── -->
                  <div class="page-header" x-show="agents.length" style="margin-bottom:20px">
                    <div class="flex items-center gap-3">
                      <h2 style="margin:0;font-size:18px">Agents</h2>
                      <div class="flex items-center gap-2">
                        <span class="badge badge-success" x-text="runningCount + ' live'"></span>
                        <span class="badge badge-muted" x-show="stoppedCount" x-text="stoppedCount + ' stopped'"></span>
                        <span class="badge badge-dim" x-show="groupCount > 1" x-text="groupCount + ' groups'"></span>
                      </div>
                    </div>
                    <div class="flex gap-2">
                      <button class="btn btn-primary btn-sm" @click="openSpawnWizard()">+ New Agent</button>
                      <button class="btn btn-ghost btn-sm" @click="loadData()">Refresh</button>
                    </div>
                  </div>

                  <!-- ── Pagination bar (only when total exceeds page) ── -->
                  <div class="flex items-center justify-between" style="margin-bottom:16px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px" x-show="$store.app.agentsIsPaginated()">
                    <span class="text-dim" x-text="$store.app.agentsPageLabel() + ' agents'"></span>
                    <div class="flex gap-2">
                      <button class="btn btn-ghost btn-sm" @click="$store.app.agentsPagePrev()" :disabled="!$store.app.agentsHasPrev()">&laquo; Prev</button>
                      <button class="btn btn-ghost btn-sm" @click="$store.app.agentsPageNext()" :disabled="!$store.app.agentsHasNext()">Next &raquo;</button>
                    </div>
                  </div>

                  <!-- ── Agent Directory (grouped) ── -->
                  <div class="agent-directory" x-show="groupedAgents.length">
                    <template x-for="group in groupedAgents" :key="group.key">
                      <div class="card agent-directory-card">
                        <button class="agent-directory-header" @click="$store.app.toggleAgentGroup(group.key)">
                          <div style="min-width:0">
                            <div class="agent-directory-title" x-text="group.label"></div>
                            <div class="agent-directory-meta" x-text="group.agent_count + ' agent' + (group.agent_count !== 1 ? 's' : '') + ' \u00B7 ' + group.running_count + ' live'"></div>
                          </div>
                          <span class="agent-directory-chevron" :class="{ collapsed: $store.app.isAgentGroupCollapsed(group.key) }">&#9654;</span>
                        </button>
                        <div class="agent-directory-list" x-show="!$store.app.isAgentGroupCollapsed(group.key)" x-transition>
                          <template x-for="agent in group.agents" :key="agent.id">
                            <div class="agent-directory-row" @click="chatWithAgent(agent)" style="cursor:pointer">
                              <div class="flex items-center gap-2" style="min-width:0;flex:1">
                                <div class="agent-list-avatar" :style="'background:hsl('+$store.app.agentHue(agent.name)+',45%,55%);color:#fff;border-color:transparent;flex-shrink:0'">
                                  <span x-show="agent.identity && agent.identity.emoji" x-text="agent.identity && agent.identity.emoji"></span>
                                  <span x-show="!agent.identity || !agent.identity.emoji" x-text="(agent.name || 'A').charAt(0).toUpperCase()" style="font-size:15px;font-weight:700"></span>
                                </div>
                                <div style="min-width:0;flex:1">
                                  <div class="font-bold truncate" style="font-size:13px" x-text="agent.name"></div>
                                  <div class="text-xs text-dim truncate" x-text="agent.model_name || '?'"></div>
                                </div>
                              </div>
                              <div class="agent-directory-row-meta">
                                <span class="badge" :class="agent.state === 'Running' ? 'badge-success' : 'badge-muted'" x-text="agent.state"></span>
                                <span class="text-xs text-dim" x-text="agentLastSeen(agent)"></span>
                                <button class="btn btn-ghost btn-sm" @click.stop="showDetail(agent)">Inspect</button>
                              </div>
                            </div>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>

                  <!-- ── Empty state ── -->
                  <div class="agent-empty-state" x-show="!agents.length">
                    <div class="agent-empty-state-icon">
                      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </div>
                    <h3>Create your first agent</h3>
                    <p>Build a custom agent or pick a template to start chatting in seconds.</p>
                    <div style="margin-top:20px">
                      <button class="btn btn-primary" @click="openSpawnWizard()">+ New Agent</button>
                    </div>
                    <!-- Meta-agents: RustyHand-specific self-extending agents -->
                    <div style="margin-top:28px;width:100%;max-width:640px" x-show="metaTemplates.length">
                      <div class="flex items-center gap-2" style="margin-bottom:10px">
                        <span class="text-xs" style="font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--accent)">Meta Agents</span>
                        <span class="badge badge-info" style="font-size:10px">self-extending</span>
                      </div>
                      <div class="card-grid" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px">
                        <template x-for="t in metaTemplates" :key="t.name">
                          <div class="card" style="cursor:pointer;padding:12px;border-left:3px solid var(--accent)" @click="spawnBuiltin(t)">
                            <div class="flex items-center gap-2" style="margin-bottom:4px">
                              <div class="font-bold" style="font-size:12px" x-text="t.name"></div>
                              <span class="badge badge-info" style="font-size:9px">meta</span>
                            </div>
                            <div class="text-xs text-dim" style="line-height:1.4" x-text="t.description"></div>
                          </div>
                        </template>
                      </div>
                    </div>

                    <!-- Templates inline for empty state -->
                    <div style="margin-top:24px;width:100%;max-width:640px">
                      <div class="text-xs text-dim" style="margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Or launch a template</div>
                      <div class="card-grid" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px">
                        <template x-for="t in templatePicks.filter(function(tt){return !tt.meta})" :key="t.name">
                          <div class="card" style="cursor:pointer;padding:12px" @click="spawnBuiltin(t)">
                            <div class="font-bold" style="font-size:12px" x-text="t.name"></div>
                            <div class="text-xs text-dim" style="margin-top:4px;line-height:1.4" x-text="t.description"></div>
                          </div>
                        </template>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </template>

        <!-- Agent detail modal with tabs (Info / Files / Config) -->
        <template x-if="showDetailModal && detailAgent">
          <div class="modal-overlay" @click.self="showDetailModal = false" @keydown.escape.window="showDetailModal = false">
            <div class="modal" style="max-width:600px">
              <div class="modal-header">
                <h3>
                  <span x-show="detailAgent.identity && detailAgent.identity.emoji" x-text="detailAgent.identity && detailAgent.identity.emoji" style="margin-right:6px"></span>
                  <span x-text="detailAgent.name"></span>
                </h3>
                <button class="modal-close" @click="showDetailModal = false">&times;</button>
              </div>
              <div class="tabs" style="margin-bottom:16px">
                <div class="tab" :class="{ active: detailTab === 'info' }" @click="detailTab = 'info'">Info</div>
                <div class="tab" :class="{ active: detailTab === 'activity' }" @click="detailTab = 'activity'; loadActivity()">Activity</div>
                <div class="tab" :class="{ active: detailTab === 'files' }" @click="detailTab = 'files'; loadAgentFiles()">Files</div>
                <div class="tab" :class="{ active: detailTab === 'config' }" @click="detailTab = 'config'">Config</div>
                <div class="tab" :class="{ active: detailTab === 'memories' }" @click="detailTab = 'memories'; loadMemories(detailAgent && detailAgent.id)">Memories</div>
              </div>

              <!-- Tab: Info -->
              <div x-show="detailTab === 'info'">
                <div class="detail-grid">
                  <div class="detail-row"><span class="detail-label">ID</span><span class="detail-value text-xs" x-text="detailAgent.id" style="word-break:break-all"></span></div>
                  <div class="detail-row"><span class="detail-label">State</span><span class="badge" :class="'badge-' + detailAgent.state.toLowerCase()" x-text="detailAgent.state"></span></div>
                  <div class="detail-row"><span class="detail-label">Mode</span>
                    <select class="form-select" style="width:140px" :value="detailAgent.mode || 'full'" @change="setMode(detailAgent, $event.target.value)">
                      <option value="observe">Observe</option><option value="assist">Assist</option><option value="full">Full</option>
                    </select>
                  </div>
                  <div class="detail-row"><span class="detail-label">Group</span><span class="detail-value" x-text="detailAgent.group || 'Ungrouped'"></span></div>
                  <div class="detail-row" x-show="detailAgent.profile"><span class="detail-label">Profile</span><span class="detail-value" style="text-transform:capitalize" x-text="detailAgent.profile || '-'"></span></div>
                  <div class="detail-row"><span class="detail-label">Provider</span><span class="detail-value" x-text="detailAgent.model_provider"></span></div>
                  <div class="detail-row">
                    <span class="detail-label">Model</span>
                    <span class="detail-value" x-show="!editingModel" style="display:flex;align-items:center;gap:8px">
                      <span x-text="detailAgent.model_name"></span>
                      <button class="btn btn-ghost btn-sm" style="padding:2px 8px;font-size:11px" @click="openModelEditor()">Change</button>
                    </span>
                  </div>
                  <!-- Inline Model Editor -->
                  <template x-if="editingModel">
                    <div style="grid-column:1/-1;padding:12px;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--bg);margin-top:4px">
                      <div style="font-size:12px;font-weight:600;margin-bottom:8px">Change Model</div>
                      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
                        <template x-for="p in wizardProviders" :key="p.id">
                          <button class="provider-pill" :class="{ active: modelChangeProvider === p.id }" @click="selectModelChangeProvider(p.id)">
                            <span x-text="p.display_name || p.id"></span>
                            <span class="pill-count" x-text="p.model_count || ''"></span>
                          </button>
                        </template>
                      </div>
                      <select class="form-select" x-model="modelChangeModel" style="font-size:13px;margin-bottom:8px">
                        <template x-for="m in modelChangeModels" :key="m.id">
                          <option :value="m.id" x-text="(m.display_name || m.id) + '  \u2022  ' + tierLabel(m.tier) + '  \u2022  ' + formatCtx(m.context_window) + ' ctx'"></option>
                        </template>
                      </select>
                      <div x-show="modelChangeInfo" style="display:flex;gap:10px;align-items:center;font-size:11px;color:var(--text-dim);margin-bottom:10px;flex-wrap:wrap">
                        <span class="model-tier-badge" :style="'background:' + tierColor(modelChangeInfo && modelChangeInfo.tier) + '22; color:' + tierColor(modelChangeInfo && modelChangeInfo.tier) + '; border:1px solid ' + tierColor(modelChangeInfo && modelChangeInfo.tier) + '44'" x-text="modelChangeInfo && tierLabel(modelChangeInfo.tier)"></span>
                        <span x-text="modelChangeInfo && formatCtx(modelChangeInfo.context_window) + ' context'"></span>
                        <span x-text="modelChangeInfo && (formatCost(modelChangeInfo.input_cost_per_m) + ' / ' + formatCost(modelChangeInfo.output_cost_per_m) + ' per 1M')"></span>
                        <span x-show="modelChangeInfo && modelChangeInfo.supports_tools" class="model-cap-badge">Tools</span>
                        <span x-show="modelChangeInfo && modelChangeInfo.supports_vision" class="model-cap-badge">Vision</span>
                      </div>
                      <div style="display:flex;gap:8px">
                        <button class="btn btn-primary btn-sm" @click="saveModelChange()" :disabled="modelChangeSaving">
                          <span x-show="!modelChangeSaving">Apply</span><span x-show="modelChangeSaving">Saving...</span>
                        </button>
                        <button class="btn btn-ghost btn-sm" @click="editingModel = false">Cancel</button>
                      </div>
                    </div>
                  </template>
                  <div class="detail-row"><span class="detail-label">Created</span><span class="detail-value" x-text="detailAgent.created_at ? new Date(detailAgent.created_at).toLocaleString() : '-'"></span></div>
                </div>
                <div class="flex gap-2 mt-4">
                  <button class="btn btn-primary" @click="chatWithAgent(detailAgent); showDetailModal = false">Chat</button>
                  <button class="btn btn-ghost" @click="showDetailModal = false; navigate('automation'); $nextTick(() => { var sp = document.querySelector('[x-data=&quot;automationPage()&quot;]'); if(sp && sp.__x) { sp.__x.$data.filterAgentId = detailAgent.id; sp.__x.$data.loadJobs(); } })">Automation</button>
                  <button class="btn btn-ghost" @click="cloneAgent(detailAgent)">Clone</button>
                  <button class="btn btn-danger" @click="killAgent(detailAgent)">Stop</button>
                </div>
              </div>

              <!-- Tab: Activity -->
              <div x-show="detailTab === 'activity'">
                <div class="flex justify-between items-center" style="margin-bottom:12px">
                  <span class="text-xs text-dim">Last 7 days of activity across audit, sessions, and cron runs.</span>
                  <button class="btn btn-ghost btn-sm" @click="loadActivity()" :disabled="activityLoading">
                    <span x-show="!activityLoading">Refresh</span>
                    <span x-show="activityLoading">Loading...</span>
                  </button>
                </div>

                <!-- Lifetime metrics summary -->
                <template x-if="agentMetrics">
                  <div class="flex gap-2" style="margin-bottom:12px">
                    <div class="card" style="flex:1;padding:10px 12px">
                      <div class="text-xs text-dim">Total API Calls</div>
                      <div class="font-bold" style="font-size:14px" x-text="(agentMetrics.total_calls || 0).toLocaleString()"></div>
                    </div>
                    <div class="card" style="flex:1;padding:10px 12px">
                      <div class="text-xs text-dim">Total Tokens</div>
                      <div class="font-bold" style="font-size:14px" x-text="((agentMetrics.total_input_tokens || 0) + (agentMetrics.total_output_tokens || 0)).toLocaleString()"></div>
                      <div class="text-xs text-dim" x-text="'in: ' + (agentMetrics.total_input_tokens || 0).toLocaleString() + ' / out: ' + (agentMetrics.total_output_tokens || 0).toLocaleString()"></div>
                    </div>
                    <div class="card" style="flex:1;padding:10px 12px">
                      <div class="text-xs text-dim">Total Cost</div>
                      <div class="font-bold" style="font-size:14px" x-text="'$' + (agentMetrics.total_cost_usd || 0).toFixed(4)"></div>
                      <div class="text-xs text-dim" x-text="(agentMetrics.total_tool_calls || 0) + ' tool calls'"></div>
                    </div>
                  </div>
                </template>

                <!-- Per-agent budget / spend -->
                <div x-show="activityBudget" class="flex gap-2" style="margin-bottom:12px">
                  <div class="card" style="flex:1;padding:10px 12px">
                    <div class="text-xs text-dim">Spend, 1h</div>
                    <div class="font-bold" style="font-size:14px" x-text="'$' + ((activityBudget && activityBudget.hourly && activityBudget.hourly.spend) || 0).toFixed(4)"></div>
                    <div class="text-xs text-dim" x-show="activityBudget && activityBudget.hourly && activityBudget.hourly.limit > 0" x-text="'limit $' + (activityBudget.hourly.limit || 0).toFixed(2)"></div>
                  </div>
                  <div class="card" style="flex:1;padding:10px 12px">
                    <div class="text-xs text-dim">Spend, 24h</div>
                    <div class="font-bold" style="font-size:14px" x-text="'$' + ((activityBudget && activityBudget.daily && activityBudget.daily.spend) || 0).toFixed(4)"></div>
                    <div class="text-xs text-dim" x-show="activityBudget && activityBudget.daily && activityBudget.daily.limit > 0" x-text="'limit $' + (activityBudget.daily.limit || 0).toFixed(2)"></div>
                  </div>
                  <div class="card" style="flex:1;padding:10px 12px">
                    <div class="text-xs text-dim">Spend, 30d</div>
                    <div class="font-bold" style="font-size:14px" x-text="'$' + ((activityBudget && activityBudget.monthly && activityBudget.monthly.spend) || 0).toFixed(2)"></div>
                    <div class="text-xs text-dim" x-show="activityBudget && activityBudget.monthly && activityBudget.monthly.limit > 0" x-text="'limit $' + (activityBudget.monthly.limit || 0).toFixed(2)"></div>
                  </div>
                </div>

                <!-- Cron jobs summary -->
                <div x-show="activityCronJobs.length" style="margin-bottom:12px">
                  <div class="text-xs text-dim" style="font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Scheduled Jobs</div>
                  <template x-for="job in activityCronJobs" :key="job.id">
                    <div class="flex justify-between items-center" style="padding:6px 8px;border-bottom:1px solid var(--border);font-size:12px">
                      <span x-text="job.name || '(unnamed)'"></span>
                      <span class="flex gap-2 items-center">
                        <span class="badge" :class="job.enabled ? 'badge-success' : 'badge-dim'" style="font-size:10px" x-text="job.enabled ? 'Active' : 'Paused'"></span>
                        <span class="text-xs text-dim" x-text="job.last_run ? activityTs(job.last_run) : 'never run'"></span>
                      </span>
                    </div>
                  </template>
                </div>

                <!-- Timeline -->
                <div>
                  <div class="text-xs text-dim" style="font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Timeline</div>
                  <div x-show="activityLoading" class="text-center text-dim" style="padding:24px">Loading activity...</div>
                  <div x-show="!activityLoading && activityError" class="error-state" style="padding:12px">
                    <span x-text="activityError"></span>
                  </div>
                  <div x-show="!activityLoading && !activityError && !activityEvents.length" class="text-center text-dim" style="padding:24px;font-size:12px">
                    No recorded activity for this agent yet.
                  </div>
